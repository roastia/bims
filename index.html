<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書店在庫管理</title>
<style>
:root {
  --primary: #2c5f8a;
  --primary-dark: #1e4560;
  --accent: #d97b3f;
  --bg: #f5f6f8;
  --card-bg: #ffffff;
  --border: #dde1e6;
  --text: #22282f;
  --text-muted: #667085;
  --danger: #c0392b;
  --success: #2e7d4f;
  --warning: #b8860b;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Hiragino Kaku Gothic ProN", "Meiryo", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--primary-dark);
  color: white;
  padding: 10px 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.logo { font-weight: bold; font-size: 1.1em; }

.topnav {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.topnav a {
  color: #e8eef4;
  text-decoration: none;
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 0.92em;
}

.topnav a:hover, .topnav a.active {
  background: var(--primary);
}

.topbar-right { display: flex; align-items: center; gap: 6px; }
.topbar-right select { padding: 5px 8px; border-radius: 4px; border: none; }

.app-main { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }

h1 { font-size: 1.4em; margin-bottom: 4px; }
h2 { font-size: 1.15em; margin-top: 28px; }
.subtitle { color: var(--text-muted); margin-top: 0; margin-bottom: 18px; font-size: 0.9em; }

.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
  margin-bottom: 16px;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
@media (max-width: 800px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}

table { width: 100%; border-collapse: collapse; font-size: 0.92em; }
th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--border); }
th { background: #eef1f5; font-weight: 600; }
tr:hover td { background: #fafbfc; }

input, select, textarea, button {
  font-family: inherit;
  font-size: 0.95em;
  padding: 7px 9px;
  border: 1px solid var(--border);
  border-radius: 5px;
}

button {
  background: var(--primary);
  color: white;
  border: none;
  cursor: pointer;
  padding: 8px 16px;
}
button:hover { background: var(--primary-dark); }
button.secondary { background: #6b7686; }
button.danger { background: var(--danger); }
button.small { padding: 4px 9px; font-size: 0.85em; }

.form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.form-row label { font-size: 0.85em; color: var(--text-muted); font-weight: 600; }

.field-required-badge,
.field-optional-badge {
  display: inline-block;
  font-size: 0.72em;
  font-weight: 700;
  border-radius: 3px;
  padding: 1px 6px;
  margin-left: 6px;
  vertical-align: middle;
}
.field-required-badge {
  background: #f8d7da;
  color: var(--danger);
}
.field-optional-badge {
  background: #eef1f5;
  color: var(--text-muted);
}
.form-inline { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }

.barcode-box {
  background: #fff7ec;
  border: 1px solid #f0c98a;
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 16px;
}
.barcode-box input { width: 100%; font-size: 1.1em; padding: 10px; }
.barcode-hint { font-size: 0.8em; color: var(--text-muted); margin-top: 6px; }

.tag-pill {
  display: inline-block;
  background: #e4ecf3;
  color: var(--primary-dark);
  border-radius: 12px;
  padding: 2px 10px;
  font-size: 0.8em;
  margin: 2px 3px 2px 0;
}
.tag-pill button {
  background: none; color: var(--danger); border: none; padding: 0 0 0 4px;
  font-size: 0.9em; cursor: pointer;
}

.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.78em; font-weight: 600; }
.badge-buy { background: #dbe9dd; color: var(--success); }
.badge-consignment { background: #fbe6d4; color: var(--accent); }
.badge-adjustment { background: #eee; color: #666; }
.badge-floor { background: #dce8f5; color: var(--primary); }
.badge-warehouse { background: #ece3f5; color: #6a3fa0; }
.badge-danger { background: #f8d7da; color: var(--danger); }
.badge-warning { background: #fff3cd; color: var(--warning); }

.stat-box { text-align: center; }
.stat-number { font-size: 2em; font-weight: 700; color: var(--primary-dark); }
.stat-label { color: var(--text-muted); font-size: 0.85em; }

.empty-msg { color: var(--text-muted); padding: 14px 0; font-style: italic; }
.loading { color: var(--text-muted); }
.error-msg { color: var(--danger); }

.toast-container {
  position: fixed; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 999;
}
.toast {
  background: #333; color: white; padding: 10px 16px; border-radius: 6px; font-size: 0.9em;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2); max-width: 320px;
}
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.warning { background: var(--warning); }

.tab-buttons { display: flex; gap: 6px; margin-bottom: 16px; }
.tab-buttons button.active { background: var(--primary-dark); }

.csv-errors { max-height: 220px; overflow-y: auto; background: #fef8f8; border: 1px solid #f3c6c6; padding: 10px; border-radius: 6px; font-size: 0.85em; }
.csv-warnings { max-height: 220px; overflow-y: auto; background: #fffbea; border: 1px solid #f0e0a0; padding: 10px; border-radius: 6px; font-size: 0.85em; margin-top: 8px; }

.csv-dropzone {
  border: 3px dashed var(--border);
  border-radius: 10px;
  padding: 56px 20px;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;
  background: var(--bg);
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 10px;
}
.csv-dropzone:hover {
  border-color: var(--primary);
}
.csv-dropzone.dragover {
  border-color: var(--primary);
  background: #eaf1f7;
}
.csv-dropzone.has-file {
  border-color: var(--success);
  border-style: solid;
}
.csv-dropzone-badge {
  display: inline-block;
  margin: 0 0 10px;
  padding: 3px 12px;
  border-radius: 999px;
  background: var(--primary);
  color: white;
  font-size: 0.78em;
  font-weight: bold;
  letter-spacing: 0.02em;
}
.csv-dropzone-text {
  margin: 0;
  color: var(--text-muted);
  font-size: 1em;
  line-height: 1.7;
}
.csv-dropzone-filename {
  margin: 10px 0 0;
  font-weight: bold;
  color: var(--text);
}

.stock-count {
  color: var(--text-muted);
  font-size: 0.85em;
  margin: 0;
}
.stock-list-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  margin: 0 0 6px;
}
.stock-pagesize {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.85em;
  color: var(--text-muted);
  white-space: nowrap;
}
.stock-pagesize select {
  padding: 3px 6px;
}
.stock-pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin: 12px 0 0;
}
.stock-pagination-label {
  font-size: 0.85em;
  color: var(--text-muted);
}

.auth-gate-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 70vh;
}
.auth-gate-card {
  width: 100%;
  max-width: 420px;
}
.auth-gate-card input[type="password"] {
  width: 100%;
  box-sizing: border-box;
}
.stock-table-wrap {
  overflow-x: auto;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.stock-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9em;
}
.stock-table thead th {
  text-align: left;
  background: var(--bg);
  padding: 8px 10px;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
  position: sticky;
  top: 0;
}
.stock-table tbody td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.stock-row {
  cursor: pointer;
}
.stock-row:hover {
  background: #eef3f8;
}
.stock-title {
  max-width: 340px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: bold;
}
.stock-ellipsis {
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.stock-table .num {
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.stock-table .mono {
  font-family: "SFMono-Regular", Consolas, monospace;
  font-size: 0.92em;
  white-space: nowrap;
}
.stock-detail-row td {
  background: #fbfbfc;
  padding: 14px 16px;
}
.stock-detail-inner table {
  margin-top: 4px;
}

.masters-table {
  table-layout: fixed;
}
.masters-table th,
.masters-table td {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.masters-table td.wrap-cell {
  white-space: normal;
}
.masters-table td input[type="text"],
.masters-table td input[type="number"] {
  width: 100%;
  box-sizing: border-box;
}
.masters-table .actions-cell {
  overflow: visible;
  white-space: normal;
}

.chart-bar-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.chart-bar-row {
  display: grid;
  grid-template-columns: 140px 1fr 60px;
  align-items: center;
  gap: 8px;
  font-size: 0.88em;
}
.chart-bar-label {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.chart-bar-track {
  background: var(--bg);
  border-radius: 4px;
  height: 14px;
  overflow: hidden;
}
.chart-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.2s;
}
.chart-bar-value {
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: var(--text-muted);
}
.chart-donut-wrap {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
.chart-legend {
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 0.88em;
}
.chart-legend-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.chart-legend-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
@media (max-width: 700px) {
  .chart-bar-row { grid-template-columns: 100px 1fr 50px; }
}

.stock-detail-store-section {
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--border);
}
.stock-detail-store-section:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}
.stock-detail-store-section h4 {
  margin: 0 0 6px;
  font-size: 0.95em;
  color: var(--primary-dark);
}

.detail-section-header {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 6px;
}
.detail-store-name {
  font-size: 0.95em;
  color: var(--primary-dark);
  white-space: nowrap;
}
.detail-tags {
  flex: 1;
  min-width: 0;
}
.tiny-link {
  background: none;
  border: none;
  color: var(--primary);
  font-size: 0.8em;
  padding: 2px 4px;
  cursor: pointer;
  white-space: nowrap;
}
.tiny-link:hover {
  text-decoration: underline;
}
.detail-tag-add-row {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}
.detail-lot-table th,
.detail-lot-table td {
  padding: 5px 8px;
  font-size: 0.9em;
}
.detail-move-toggle {
  margin-top: 4px;
  display: inline-block;
}

.stock-move-form {
  margin-top: 6px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.detail-move-fields {
  align-items: flex-end;
  gap: 8px 12px;
}
.detail-move-fields .form-row {
  margin-bottom: 0;
}

</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-left">
    <span class="logo">書店在庫管理</span>
  </div>
  <nav class="topnav">
    <a href="#/dashboard" data-route="/dashboard">ダッシュボード</a>
    <a href="#/stock" data-route="/stock">在庫一覧</a>
    <a href="#/receive" data-route="/receive">入荷登録</a>
    <a href="#/sales" data-route="/sales">販売履歴</a>
    <a href="#/returns" data-route="/returns">返品管理</a>
    <a href="#/stocktake" data-route="/stocktake">棚卸</a>
    <a href="#/masters" data-route="/masters">マスタ管理</a>
  </nav>
  <div class="topbar-right">
    <button id="logout-btn" class="small secondary">ログアウト</button>
  </div>
</header>

<main id="app" class="app-main">
  <p class="loading">読み込み中...</p>
</main>

<div id="toast-container" class="toast-container"></div>

<script>
// ============================================================
// パスワードハッシュ用の軽量SHA-256実装(純粋JS、外部ライブラリ・Web Crypto API不要)
// Web Crypto API(crypto.subtle)はブラウザの「secure context」判定に依存し、
// file:// で直接HTMLファイルを開いた場合などに使えないことがあるため、
// どんな開き方をしても同じように動くようこの実装を使う。
// (SHA-256の標準テストベクタで正しさを確認済み)
// ============================================================
const SimpleSha256 = (() => {
  function rightRotate(value, amount) {
    return (value >>> amount) | (value << (32 - amount));
  }

  const K = [
    0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
    0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
    0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
    0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
    0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
    0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
    0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
    0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2,
  ];

  function sha256(bytes) {
    const h = [0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a, 0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19];
    const bitLen = bytes.length * 8;
    const withOne = new Uint8Array(((bytes.length + 9 + 63) & ~63));
    withOne.set(bytes);
    withOne[bytes.length] = 0x80;
    const view = new DataView(withOne.buffer);
    view.setUint32(withOne.length - 4, bitLen >>> 0, false);
    view.setUint32(withOne.length - 8, Math.floor(bitLen / 4294967296), false);

    for (let chunkStart = 0; chunkStart < withOne.length; chunkStart += 64) {
      const w = new Array(64);
      for (let i = 0; i < 16; i++) w[i] = view.getUint32(chunkStart + i * 4, false);
      for (let i = 16; i < 64; i++) {
        const s0 = rightRotate(w[i - 15], 7) ^ rightRotate(w[i - 15], 18) ^ (w[i - 15] >>> 3);
        const s1 = rightRotate(w[i - 2], 17) ^ rightRotate(w[i - 2], 19) ^ (w[i - 2] >>> 10);
        w[i] = (w[i - 16] + s0 + w[i - 7] + s1) | 0;
      }
      let [a, b, c, d, e, f, g, hh] = h;
      for (let i = 0; i < 64; i++) {
        const S1 = rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25);
        const ch = (e & f) ^ (~e & g);
        const temp1 = (hh + S1 + ch + K[i] + w[i]) | 0;
        const S0 = rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22);
        const maj = (a & b) ^ (a & c) ^ (b & c);
        const temp2 = (S0 + maj) | 0;
        hh = g; g = f; f = e; e = (d + temp1) | 0;
        d = c; c = b; b = a; a = (temp1 + temp2) | 0;
      }
      h[0] = (h[0] + a) | 0; h[1] = (h[1] + b) | 0; h[2] = (h[2] + c) | 0; h[3] = (h[3] + d) | 0;
      h[4] = (h[4] + e) | 0; h[5] = (h[5] + f) | 0; h[6] = (h[6] + g) | 0; h[7] = (h[7] + hh) | 0;
    }
    return h.map((x) => (x >>> 0).toString(16).padStart(8, "0")).join("");
  }

  function hashHex(str) {
    return sha256(new TextEncoder().encode(str));
  }

  return { hashHex };
})();

const PasswordCrypto = {
  ITERATIONS: 20000,

  randomSaltHex(len) {
    len = len || 16;
    const arr = new Uint8Array(len);
    if (typeof window !== "undefined" && window.crypto && window.crypto.getRandomValues) {
      window.crypto.getRandomValues(arr);
    } else {
      for (let i = 0; i < len; i++) arr[i] = Math.floor(Math.random() * 256);
    }
    return Array.from(arr).map((b) => b.toString(16).padStart(2, "0")).join("");
  },

  // saltを混ぜてSHA-256を繰り返し適用する簡易的なストレッチング(総当たり攻撃を遅くする目的)
  derive(password, saltHex, iterations) {
    iterations = iterations || this.ITERATIONS;
    let value = saltHex + ":" + String(password);
    for (let i = 0; i < iterations; i++) {
      value = SimpleSha256.hashHex(value + saltHex);
    }
    return value;
  },
};

// ============================================================
// AuthGate: パスワードによるアクセス制限
// 注意: これはこのブラウザ内でのアクセスにパスワードを要求する「入り口の鍵」であり、
// IndexedDBに保存されているデータそのものを暗号化するものではない。
// ブラウザの開発者ツールなどから直接データを見られる可能性はある点に留意すること。
// ============================================================
const AuthGate = {
  SESSION_KEY: "bookstore_auth_logged_in",

  hasPassword() {
    const auth = AppState.state && AppState.state.auth;
    return !!(auth && auth.passwordHash && auth.passwordSalt);
  },

  isLoggedIn() {
    return localStorage.getItem(this.SESSION_KEY) === "1";
  },

  async setPassword(newPassword) {
    const salt = PasswordCrypto.randomSaltHex();
    const hash = PasswordCrypto.derive(newPassword, salt);
    AppState.state.auth = { passwordHash: hash, passwordSalt: salt };
    await persistState();
  },

  verifyPassword(password) {
    const auth = AppState.state.auth;
    if (!auth || !auth.passwordHash || !auth.passwordSalt) return false;
    const hash = PasswordCrypto.derive(password, auth.passwordSalt);
    return hash === auth.passwordHash;
  },

  async changePassword(oldPassword, newPassword) {
    if (!this.verifyPassword(oldPassword)) {
      throw new Error("現在のパスワードが正しくありません");
    }
    await this.setPassword(newPassword);
  },

  markLoggedIn() {
    localStorage.setItem(this.SESSION_KEY, "1");
  },

  logout() {
    localStorage.removeItem(this.SESSION_KEY);
    location.reload();
  },

  showTopbar(show) {
    const el = document.querySelector(".topbar");
    if (el) el.style.display = show ? "" : "none";
  },

  renderSetup(root, onDone) {
    this.showTopbar(false);
    root.innerHTML = `
      <div class="auth-gate-wrap">
        <div class="card auth-gate-card">
          <h1 style="margin-top:0;">初期設定: パスワードを設定してください</h1>
          <p class="subtitle">次回以降このアプリを開くときに、このパスワードの入力が必要になります。忘れてしまうと解除する手段がないため(データはこのブラウザの中だけに保存されており、外部への問い合わせでは復元できません)、安全な場所に控えておいてください。</p>
          <div class="form-row">
            <label>新しいパスワード(4文字以上)</label>
            <input type="password" id="auth-new-pw" autocomplete="new-password">
          </div>
          <div class="form-row">
            <label>確認のため、もう一度入力してください</label>
            <input type="password" id="auth-new-pw2" autocomplete="new-password">
          </div>
          <p id="auth-setup-error" class="error-msg" style="display:none;"></p>
          <button id="auth-setup-btn">パスワードを設定する</button>
        </div>
      </div>
    `;

    const doSetup = async () => {
      const pw1 = document.getElementById("auth-new-pw").value;
      const pw2 = document.getElementById("auth-new-pw2").value;
      const errEl = document.getElementById("auth-setup-error");
      errEl.style.display = "none";
      if (pw1.length < 4) {
        errEl.textContent = "パスワードは4文字以上で設定してください";
        errEl.style.display = "block";
        return;
      }
      if (pw1 !== pw2) {
        errEl.textContent = "入力したパスワードが一致しません";
        errEl.style.display = "block";
        return;
      }
      await this.setPassword(pw1);
      this.markLoggedIn();
      this.showTopbar(true);
      onDone();
    };
    document.getElementById("auth-setup-btn").onclick = doSetup;
    document.getElementById("auth-new-pw2").addEventListener("keydown", (e) => { if (e.key === "Enter") doSetup(); });
    document.getElementById("auth-new-pw").focus();
  },

  renderLogin(root, onDone) {
    this.showTopbar(false);
    root.innerHTML = `
      <div class="auth-gate-wrap">
        <div class="card auth-gate-card">
          <h1 style="margin-top:0;">ログイン</h1>
          <p class="subtitle">パスワードを入力してください。</p>
          <div class="form-row">
            <label>パスワード</label>
            <input type="password" id="auth-login-pw" autocomplete="current-password">
          </div>
          <p id="auth-login-error" class="error-msg" style="display:none;"></p>
          <button id="auth-login-btn">ログイン</button>
        </div>
      </div>
    `;

    const doLogin = () => {
      const pwInput = document.getElementById("auth-login-pw");
      const errEl = document.getElementById("auth-login-error");
      if (this.verifyPassword(pwInput.value)) {
        this.markLoggedIn();
        this.showTopbar(true);
        onDone();
      } else {
        errEl.textContent = "パスワードが正しくありません";
        errEl.style.display = "block";
        pwInput.value = "";
        pwInput.focus();
      }
    };
    document.getElementById("auth-login-btn").onclick = doLogin;
    document.getElementById("auth-login-pw").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
    document.getElementById("auth-login-pw").focus();
  },

  guard(root, onUnlocked) {
    if (!this.hasPassword()) {
      this.renderSetup(root, onUnlocked);
    } else if (!this.isLoggedIn()) {
      this.renderLogin(root, onUnlocked);
    } else {
      onUnlocked();
    }
  },
};

// ============================================================
// ローカルデータベース(IndexedDB)
// アプリ全体の状態を1つのJSONドキュメントとしてIndexedDBに保存する。
// サーバーを使わず、このMac(このブラウザ)の中だけでデータを完結させる。
// ============================================================
const DB_NAME = "bookstore_offline_db";
const DB_STORE = "app_state";
const DB_KEY = "main";
const DB_VERSION = 1;

const Db = {
  _dbPromise: null,

  open() {
    if (this._dbPromise) return this._dbPromise;
    this._dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(DB_STORE)) {
          db.createObjectStore(DB_STORE);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return this._dbPromise;
  },

  async loadState() {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readonly");
      const store = tx.objectStore(DB_STORE);
      const req = store.get(DB_KEY);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  },

  async saveState(state) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readwrite");
      const store = tx.objectStore(DB_STORE);
      const req = store.put(state, DB_KEY);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  },
};
