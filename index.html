// ============================================================
// 書籍JANコード(2段バーコード)の解析
// 上段: ISBNをEAN-13化したコード(978/979から始まる13桁)
// 下段: 192(または191) + Cコード(図書分類4桁) + 本体価格(5桁) + チェックデジット
// ============================================================
const SALES_TARGET = {
  "0": "一般", "1": "教養", "2": "実用", "3": "専門", "4": "検定",
  "5": "婦人", "6": "学参I(小中学生)", "7": "学参II(高校生)", "8": "児童", "9": "雑誌扱い書籍",
};
const PUBLICATION_FORM = {
  "0": "単行本", "1": "文庫", "2": "新書", "3": "全集・双書", "4": "ムック・その他",
  "5": "事・辞典", "6": "図鑑", "7": "絵本", "8": "磁性媒体・電子媒体", "9": "コミック",
};
const CONTENT_MAJOR = {
  "0": "総記", "1": "哲学・心理学・宗教", "2": "歴史・地理", "3": "社会科学", "4": "自然科学",
  "5": "工学・工業・科学技術", "6": "産業", "7": "芸術・生活", "8": "語学", "9": "文学",
};

const Barcode = {
  normalizeCode(raw) {
    return String(raw || "").replace(/[^0-9]/g, "").trim();
  },

  ean13ChecksumValid(code13) {
    if (!code13 || code13.length !== 13 || !/^\d+$/.test(code13)) return false;
    const digits = code13.split("").map(Number);
    let total = 0;
    for (let i = 0; i < 12; i++) total += i % 2 === 0 ? digits[i] : digits[i] * 3;
    const check = (10 - (total % 10)) % 10;
    return check === digits[12];
  },

  isbn10to13(isbn10) {
    const core = isbn10.slice(0, 9);
    const base = "978" + core;
    const digits = base.split("").map(Number);
    let total = 0;
    for (let i = 0; i < digits.length; i++) total += i % 2 === 0 ? digits[i] : digits[i] * 3;
    const check = (10 - (total % 10)) % 10;
    return base + String(check);
  },

  classificationTextFromCcode(cCode) {
    if (!cCode || cCode.length !== 4) return `分類コード:${cCode}`;
    const target = SALES_TARGET[cCode[0]] || "不明";
    const form = PUBLICATION_FORM[cCode[1]] || "不明";
    const major = CONTENT_MAJOR[cCode[2]] || "不明";
    return `${target}/${form}/${major}(C${cCode})`;
  },

  identify(raw) {
    let code = this.normalizeCode(raw);
    if (code.length === 10) code = this.isbn10to13(code);
    if (!code || code.length !== 13) return { kind: "unknown", raw };

    if (code.startsWith("978") || code.startsWith("979")) {
      return { kind: "isbn", isbn13: code };
    }
    if ((code.startsWith("191") || code.startsWith("192")) && code.length === 13) {
      const cCode = code.slice(3, 7);
      const priceStr = code.slice(7, 12);
      const price = parseInt(priceStr, 10) || 0;
      return {
        kind: "price", cCode, price,
        classificationText: this.classificationTextFromCcode(cCode),
      };
    }
    return { kind: "unknown", raw };
  },
};

// ============================================================
// openBD (https://openbd.jp) からの書誌情報自動取得(任意・要インターネット接続)
// 通信できない場合は null を返し、手入力にフォールバックする。
// ============================================================
const OpenBd = {
  async fetchBookInfo(isbn13) {
    try {
      const res = await fetch(`https://api.openbd.jp/v1/get?isbn=${encodeURIComponent(isbn13)}`, {
        method: "GET",
      });
      if (!res.ok) return null;
      const data = await res.json();
      if (!data || !data[0]) return null;
      const item = data[0];
      const summary = item.summary || {};
      const result = {
        title: summary.title || "",
        author: summary.author || "",
        publisher: summary.publisher || "",
        coverUrl: summary.cover || "",
      };
      const price = this._extractPrice(item);
      if (price) result.price = price;
      return result;
    } catch (e) {
      return null;
    }
  },

  _extractPrice(item) {
    try {
      const onix = item.onix || {};
      let prices = ((onix.ProductSupply || {}).SupplyDetail || {}).Price;
      if (!prices) return null;
      if (!Array.isArray(prices)) prices = [prices];
      for (const p of prices) {
        if (p && p.PriceAmount) {
          const n = parseFloat(p.PriceAmount);
          if (!isNaN(n)) return Math.round(n);
        }
      }
    } catch (e) { /* ignore */ }
    return null;
  },
};

// ============================================================
// CSV読み込み/書き出しユーティリティ(外部ライブラリ不使用)
// ============================================================
const Csv = {
  decodeArrayBuffer(buf) {
    // UTF-8(BOM付き含む) → 失敗したら Shift_JIS(CP932) にフォールバック
    try {
      const utf8 = new TextDecoder("utf-8", { fatal: true }).decode(buf);
      return utf8.replace(/^﻿/, "");
    } catch (e) { /* fall through */ }
    try {
      return new TextDecoder("shift_jis").decode(buf);
    } catch (e) { /* fall through */ }
    return new TextDecoder("utf-8").decode(buf);
  },

  // シンプルなCSVパーサ(ダブルクォート・カンマ・改行(CRLF/LF)に対応)
  parse(text) {
    const rows = [];
    let row = [];
    let field = "";
    let inQuotes = false;
    const pushField = () => { row.push(field); field = ""; };
    const pushRow = () => { rows.push(row); row = []; };

    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i++; }
          else { inQuotes = false; }
        } else {
          field += c;
        }
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ",") pushField();
        else if (c === "\r") { /* skip */ }
        else if (c === "\n") { pushField(); pushRow(); }
        else field += c;
      }
    }
    if (field.length > 0 || row.length > 0) { pushField(); pushRow(); }

    const filtered = rows.filter((r) => !(r.length === 1 && r[0] === ""));
    if (filtered.length === 0) return [];
    const header = filtered[0].map((h) => h.trim());
    const records = [];
    for (let i = 1; i < filtered.length; i++) {
      const r = filtered[i];
      const obj = {};
      header.forEach((h, idx) => { obj[h] = (r[idx] !== undefined ? r[idx] : "").trim(); });
      obj.__line = i + 1;
      records.push(obj);
    }
    return records;
  },

  downloadText(filename, content, mime) {
    const blob = new Blob(["﻿" + content], { type: mime || "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  },

  // ドラッグ&ドロップ + クリックでファイル選択できるドロップゾーンの共通セットアップ
  // (入荷登録・販売履歴のCSV取込セクションで共用する)
  setupDropzone(zoneId, inputId, filenameId) {
    const zone = document.getElementById(zoneId);
    const input = document.getElementById(inputId);
    const filenameEl = document.getElementById(filenameId);
    if (!zone || !input || !filenameEl) return;

    const showFilename = () => {
      if (input.files.length) {
        filenameEl.textContent = `選択中: ${input.files[0].name}`;
        zone.classList.add("has-file");
      } else {
        filenameEl.textContent = "";
        zone.classList.remove("has-file");
      }
    };

    zone.onclick = () => input.click();
    input.onchange = showFilename;

    ["dragenter", "dragover"].forEach((evt) => {
      zone.addEventListener(evt, (e) => {
        e.preventDefault();
        e.stopPropagation();
        zone.classList.add("dragover");
      });
    });
    ["dragleave", "dragend"].forEach((evt) => {
      zone.addEventListener(evt, (e) => {
        e.preventDefault();
        e.stopPropagation();
        zone.classList.remove("dragover");
      });
    });
    zone.addEventListener("drop", (e) => {
      e.preventDefault();
      e.stopPropagation();
      zone.classList.remove("dragover");
      const files = e.dataTransfer.files;
      if (!files.length) return;
      const csvFile = Array.from(files).find((f) => f.name.toLowerCase().endsWith(".csv")) || files[0];
      if (!csvFile.name.toLowerCase().endsWith(".csv")) {
        Util.toast("CSVファイルをドロップしてください", "warning");
        return;
      }
      const dt = new DataTransfer();
      dt.items.add(csvFile);
      input.files = dt.files;
      showFilename();
    });
  },

  // CSV取込結果(成功/エラー/警告件数)の共通表示処理
  renderImportResult(el, result) {
    Util.toast(`取込完了: 成功${result.success_rows}件 / 失敗${result.error_rows}件`, result.error_rows > 0 ? "warning" : "success");
    el.innerHTML = `
      <p style="margin-top:14px;">全${result.total_rows}行中、成功 ${result.success_rows}件、エラー ${result.error_rows}件</p>
      ${result.errors.length ? `<div class="csv-errors"><strong>エラー</strong><ul>${result.errors.map((e) => `<li>${Util.escapeHtml(e)}</li>`).join("")}</ul></div>` : ""}
      ${result.warnings.length ? `<div class="csv-warnings"><strong>警告</strong><ul>${result.warnings.map((w) => `<li>${Util.escapeHtml(w)}</li>`).join("")}</ul></div>` : ""}
    `;
  },
};

// ============================================================
// ビジネスロジック(旧サーバー版 crud.py のJS移植)
// すべて state(IndexedDBにも保存されるJSオブジェクト)を直接操作する。
// ============================================================
const PURCHASE_TYPE_JP = { "買切": "buy", "委託": "consignment", "buy": "buy", "consignment": "consignment" };

function todayStr() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

function daysBetween(fromStr, toStr) {
  const a = new Date(fromStr + "T00:00:00");
  const b = new Date(toStr + "T00:00:00");
  return Math.round((b - a) / 86400000);
}

function stripCsvTextMarker(v) {
  // Excel対策で先頭に付与した ' (アポストロフィ) を取り除く
  return String(v || "").replace(/^'+/, "").trim();
}

function parseFlexibleDate(value) {
  if (!value) return null;
  const v = String(value).trim();
  let m = v.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2, "0")}-${String(m[3]).padStart(2, "0")}`;
  m = v.match(/^(\d{4})(\d{2})(\d{2})$/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  return null;
}

const Crud = {
  async getOrCreateBook(state, isbn, opts = {}, tryOnlineLookup = true) {
    const { title = "", author = "", publisher = "", price = null, cCode = "", classificationText = "" } = opts;
    let book = state.books[isbn];
    if (book) {
      let changed = false;
      if (title && !book.title) { book.title = title; changed = true; }
      if (author && !book.author) { book.author = author; changed = true; }
      if (publisher && !book.publisher) { book.publisher = publisher; changed = true; }
      if (price && !book.price) { book.price = price; changed = true; }
      if (cCode && !book.cCode) { book.cCode = cCode; book.classificationText = classificationText; changed = true; }
      return book;
    }

    let fetched = null;
    if (tryOnlineLookup && !(title && author && publisher)) {
      fetched = await OpenBd.fetchBookInfo(isbn);
    }

    book = {
      isbn,
      title: title || (fetched && fetched.title) || "",
      author: author || (fetched && fetched.author) || "",
      publisher: publisher || (fetched && fetched.publisher) || "",
      price: price || (fetched && fetched.price) || 0,
      cCode: cCode,
      classificationText: classificationText,
      coverUrl: (fetched && fetched.coverUrl) || "",
      isManualEntry: !fetched,
    };
    state.books[isbn] = book;
    return book;
  },

  async receiveStock(state, storeId, req) {
    await this.getOrCreateBook(state, req.isbn, {
      title: req.title || "", author: req.author || "", publisher: req.publisher || "", price: req.price,
    });
    const lot = {
      id: state.nextId.stockLot++,
      storeId, isbn: req.isbn, wholesalerId: req.wholesalerId || null,
      purchaseType: req.purchaseType, quantity: req.quantity, initialQuantity: req.quantity,
      unitCost: req.unitCost || 0,
      receivedDate: req.receivedDate || todayStr(),
      consignmentDeadline: req.purchaseType === "consignment" ? (req.consignmentDeadline || null) : null,
      location: req.location === "warehouse" ? "warehouse" : "floor",
      status: "active", source: "manual", note: req.note || "",
    };
    state.stockLots.push(lot);
    return lot;
  },

  getStockSummary(state, storeId, query) {
    // storeId が null/undefined の場合は全店舗を横断して集計する
    const allStores = storeId === null || storeId === undefined;
    const lots = allStores ? state.stockLots.slice() : state.stockLots.filter((l) => l.storeId === storeId);
    const byIsbn = {};
    lots.forEach((l) => { (byIsbn[l.isbn] = byIsbn[l.isbn] || []).push(l); });

    // 店舗・卸会社・タグ付けは書籍点数分だけ参照されるため、
    // 都度state.stores/state.wholesalers/state.bookTagsを線形探索すると
    // 書籍数が多いときに全体がO(書籍数×マスタ件数)になり重くなる。
    // ここで一度だけMap/Setを組んでO(1)参照にする(結果の並び順は従来と変わらない)。
    const storesById = new Map(state.stores.map((s) => [s.id, s]));
    const wholesalersById = new Map(state.wholesalers.map((w) => [w.id, w]));
    const bookTagIdsByStoreIsbn = new Map();
    state.bookTags.forEach((bt) => {
      const key = bt.storeId + "|" + bt.isbn;
      let arr = bookTagIdsByStoreIsbn.get(key);
      if (!arr) { arr = []; bookTagIdsByStoreIsbn.set(key, arr); }
      arr.push(bt.tagId);
    });

    // 複数ワード検索(スペース区切り・すべての語を含む場合のみヒット)に対応
    const terms = (query || "").trim().split(/[\s\u3000]+/).filter(Boolean).map((t) => t.toLowerCase());

    const results = [];
    for (const isbn of Object.keys(byIsbn)) {
      const book = state.books[isbn];
      if (!book) continue;
      const lotList = byIsbn[isbn];
      const totalQty = lotList.reduce((s, l) => s + l.quantity, 0);
      const floorQty = lotList.filter((l) => (l.location || "floor") === "floor").reduce((s, l) => s + l.quantity, 0);
      const warehouseQty = lotList.filter((l) => l.location === "warehouse").reduce((s, l) => s + l.quantity, 0);

      const storeIdsForBook = [...new Set(lotList.map((l) => l.storeId))];
      const tagsByStore = storeIdsForBook.map((sid) => {
        const tagIds = bookTagIdsByStoreIsbn.get(sid + "|" + isbn) || [];
        const tagIdSet = new Set(tagIds);
        const names = state.tags.filter((t) => tagIdSet.has(t.id)).map((t) => t.name);
        const st = storesById.get(sid);
        return { storeId: sid, storeName: st ? st.name : null, tags: names };
      });
      const tags = [...new Set(tagsByStore.flatMap((x) => x.tags))];
      const storeNames = tagsByStore.map((x) => x.storeName).filter(Boolean);

      const lotOuts = lotList.map((l) => {
        const w = l.wholesalerId ? wholesalersById.get(l.wholesalerId) : null;
        const st = storesById.get(l.storeId);
        return {
          id: l.id, isbn: l.isbn, storeId: l.storeId, storeName: st ? st.name : null,
          wholesalerId: l.wholesalerId, wholesalerName: w ? w.name : null,
          purchaseType: l.purchaseType, quantity: l.quantity, initialQuantity: l.initialQuantity,
          unitCost: l.unitCost, receivedDate: l.receivedDate, consignmentDeadline: l.consignmentDeadline,
          location: l.location || "floor",
          status: l.status, note: l.note,
        };
      });

      if (terms.length) {
        const wholesalerNames = [...new Set(lotOuts.map((l) => l.wholesalerName).filter(Boolean))];
        const hay = [
          book.isbn, book.title, book.author, book.publisher,
          ...storeNames, ...tags, ...wholesalerNames,
        ].join(" ").toLowerCase();
        const matchesAll = terms.every((t) => hay.includes(t));
        if (!matchesAll) continue;
      }
      results.push({
        isbn, title: book.title, author: book.author, publisher: book.publisher, price: book.price,
        totalQuantity: totalQty, floorQuantity: floorQty, warehouseQuantity: warehouseQty,
        storeNames, tags, tagsByStore, lots: lotOuts,
      });
    }
    results.sort((a, b) => b.totalQuantity - a.totalQuantity || (a.title || a.isbn).localeCompare(b.title || b.isbn, "ja"));
    return results;
  },

  _lotSortKey(lot) {
    // 販売・返品はまず店内在庫から引き当て、倉庫在庫はその後に回す
    const locTier = (lot.location || "floor") === "floor" ? 0 : 1;
    if (lot.purchaseType === "consignment" && lot.consignmentDeadline) return [locTier, 0, lot.consignmentDeadline];
    return [locTier, 1, lot.receivedDate || "9999-99-99"];
  },

  allocateSale(state, storeId, isbn, quantity, saleDate, unitPrice, importBatch) {
    let remaining = quantity;
    saleDate = saleDate || todayStr();
    const lots = state.stockLots
      .filter((l) => l.storeId === storeId && l.isbn === isbn && l.quantity > 0 && l.status === "active")
      .slice()
      .sort((a, b) => {
        const ka = this._lotSortKey(a), kb = this._lotSortKey(b);
        if (ka[0] !== kb[0]) return ka[0] - kb[0];
        if (ka[1] !== kb[1]) return ka[1] - kb[1];
        return String(ka[2]).localeCompare(String(kb[2]));
      });

    const created = [];
    for (const lot of lots) {
      if (remaining <= 0) break;
      const take = Math.min(lot.quantity, remaining);
      lot.quantity -= take;
      if (lot.quantity === 0) lot.status = "depleted";
      const rec = {
        id: state.nextId.sale++, storeId, isbn, lotId: lot.id, quantity: take,
        saleDate, unitPrice, importBatch: importBatch || "", oversold: false,
      };
      state.sales.push(rec);
      created.push(rec);
      remaining -= take;
    }

    const oversold = remaining > 0;
    if (oversold) {
      const rec = {
        id: state.nextId.sale++, storeId, isbn, lotId: null, quantity: remaining,
        saleDate, unitPrice, importBatch: importBatch || "", oversold: true,
      };
      state.sales.push(rec);
      created.push(rec);
    }
    return { oversold, shortfall: oversold ? remaining : 0, records: created };
  },

  getReturnCandidates(state, storeId) {
    const today = todayStr();
    const lots = state.stockLots
      .filter((l) => l.storeId === storeId && l.purchaseType === "consignment" && l.quantity > 0 && l.status === "active")
      .slice()
      .sort((a, b) => String(a.consignmentDeadline || "9999-99-99").localeCompare(String(b.consignmentDeadline || "9999-99-99")));

    return lots.map((lot) => {
      const book = state.books[lot.isbn];
      const w = lot.wholesalerId ? state.wholesalers.find((x) => x.id === lot.wholesalerId) : null;
      return {
        lotId: lot.id, isbn: lot.isbn, title: book ? book.title : "",
        wholesalerId: lot.wholesalerId, wholesalerName: w ? w.name : null,
        quantity: lot.quantity, receivedDate: lot.receivedDate, consignmentDeadline: lot.consignmentDeadline,
        location: lot.location || "floor",
        daysUntilDeadline: lot.consignmentDeadline ? daysBetween(today, lot.consignmentDeadline) : null,
      };
    });
  },

  processReturn(state, storeId, req) {
    const lot = state.stockLots.find((l) => l.id === req.lotId);
    if (!lot || lot.storeId !== storeId) throw new Error("指定された在庫ロットが見つかりません");
    if (req.quantity > lot.quantity) throw new Error(`返品数量(${req.quantity})がロット残数(${lot.quantity})を超えています`);

    lot.quantity -= req.quantity;
    if (lot.quantity === 0) lot.status = "returned";

    const rec = {
      id: state.nextId.returnRec++, storeId, lotId: lot.id, isbn: lot.isbn, wholesalerId: lot.wholesalerId,
      quantity: req.quantity, returnDate: req.returnDate || todayStr(), note: req.note || "",
    };
    state.returns.push(rec);
    return rec;
  },

  getStocktakeRows(state, storeId) {
    const byIsbn = {};
    state.stockLots.filter((l) => l.storeId === storeId).forEach((l) => {
      byIsbn[l.isbn] = (byIsbn[l.isbn] || 0) + l.quantity;
    });
    const out = Object.keys(byIsbn).map((isbn) => {
      const book = state.books[isbn];
      return { isbn, title: book ? book.title : "", systemQty: byIsbn[isbn] };
    });
    out.sort((a, b) => (a.title || a.isbn).localeCompare(b.title || b.isbn, "ja"));
    return out;
  },

  processStocktake(state, storeId, req) {
    const systemQty = state.stockLots
      .filter((l) => l.storeId === storeId && l.isbn === req.isbn)
      .reduce((s, l) => s + l.quantity, 0);
    const diff = req.countedQty - systemQty;

    if (diff !== 0) {
      if (!state.books[req.isbn]) {
        state.books[req.isbn] = { isbn: req.isbn, title: "", author: "", publisher: "", price: 0, cCode: "", classificationText: "", coverUrl: "", isManualEntry: true };
      }
      state.stockLots.push({
        id: state.nextId.stockLot++, storeId, isbn: req.isbn, wholesalerId: null,
        purchaseType: "adjustment", quantity: diff, initialQuantity: diff, unitCost: 0,
        receivedDate: req.takenDate || todayStr(),
        consignmentDeadline: null,
        status: diff > 0 ? "active" : "depleted", source: "stocktake",
        note: `棚卸調整(${diff > 0 ? "過剰" : "不足"}): ${req.note || ""}`.trim(),
      });
    }

    state.stocktakeEntries.push({
      id: state.nextId.stocktake++, storeId, isbn: req.isbn, systemQty, countedQty: req.countedQty,
      diff, takenDate: req.takenDate || todayStr(), note: req.note || "",
    });

    return { isbn: req.isbn, systemQty, countedQty: req.countedQty, diff };
  },

  getDashboard(state, storeId, alertDays = 14, bestSellerDays = 30, bestSellerLimit = 20) {
    const wholesalersById = new Map(state.wholesalers.map((w) => [w.id, w]));
    const lots = state.stockLots.filter((l) => l.storeId === storeId);
    const byIsbnQty = {};
    lots.forEach((l) => { byIsbnQty[l.isbn] = (byIsbnQty[l.isbn] || 0) + l.quantity; });

    const zeroStock = [];
    Object.keys(byIsbnQty).forEach((isbn) => {
      if (byIsbnQty[isbn] <= 0) {
        const book = state.books[isbn];
        zeroStock.push({ isbn, title: book ? book.title : "" });
      }
    });

    const today = todayStr();
    const consignmentAlerts = lots
      .filter((l) => l.purchaseType === "consignment" && l.quantity > 0 && l.status === "active" && l.consignmentDeadline
        && daysBetween(today, l.consignmentDeadline) <= alertDays)
      .sort((a, b) => String(a.consignmentDeadline).localeCompare(String(b.consignmentDeadline)))
      .map((lot) => {
        const book = state.books[lot.isbn];
        const w = lot.wholesalerId ? wholesalersById.get(lot.wholesalerId) : null;
        return {
          lotId: lot.id, isbn: lot.isbn, title: book ? book.title : "", wholesalerName: w ? w.name : null,
          quantity: lot.quantity, consignmentDeadline: lot.consignmentDeadline,
          daysUntilDeadline: daysBetween(today, lot.consignmentDeadline),
        };
      });

    const sinceDays = bestSellerDays;
    const sinceDate = new Date();
    sinceDate.setDate(sinceDate.getDate() - sinceDays);
    const sinceStr = todayStrFromDate(sinceDate);
    const salesTotals = {};
    state.sales.filter((s) => s.storeId === storeId && s.saleDate >= sinceStr).forEach((s) => {
      salesTotals[s.isbn] = (salesTotals[s.isbn] || 0) + s.quantity;
    });
    const bestSellers = Object.keys(salesTotals)
      .map((isbn) => ({ isbn, title: (state.books[isbn] || {}).title || "", totalSold: salesTotals[isbn] }))
      .sort((a, b) => b.totalSold - a.totalSold)
      .slice(0, bestSellerLimit);

    return {
      zeroStock, consignmentAlerts, bestSellers,
      totalTitlesInStock: Object.values(byIsbnQty).filter((q) => q > 0).length,
      totalQuantityInStock: Object.values(byIsbnQty).filter((q) => q > 0).reduce((s, q) => s + q, 0),
    };
  },

  getDashboardAll(state, alertDays = 14, bestSellerDays = 30, bestSellerLimit = 20) {
    const storesById = new Map(state.stores.map((s) => [s.id, s]));
    const wholesalersById = new Map(state.wholesalers.map((w) => [w.id, w]));
    const today = todayStr();

    // 店舗別の内訳(在庫あり点数・合計冊数・返品アラート件数)は
    // 全ロットを一度だけ店舗別にグルーピングして集計する。
    // (以前は店舗ごとにgetDashboard()を丸ごと呼び出しており、
    //  店舗数が増えるほど全ロット・全売上を店舗数分再走査して遅くなっていた上、
    //  そこで計算したbestSellers/zeroStockの結果もここでは使われず捨てられていた)
    const lotsByStore = new Map();
    state.stockLots.forEach((l) => {
      let arr = lotsByStore.get(l.storeId);
      if (!arr) { arr = []; lotsByStore.set(l.storeId, arr); }
      arr.push(l);
    });
    // 「在庫0の書籍」は店舗ごとに判定する。
    // (以前は全店舗の合計数量で判定していたため、ある店舗では売り切れていても
    //  別の店舗に在庫があると合計が0にならず、一覧に出てこない不具合があった。
    //  実務上は「自店で切れている本」を知りたいので、店舗×書籍単位でチェックする)
    const zeroStock = [];
    const byStore = state.stores.map((s) => {
      const lots = lotsByStore.get(s.id) || [];
      const byIsbnQty = {};
      lots.forEach((l) => { byIsbnQty[l.isbn] = (byIsbnQty[l.isbn] || 0) + l.quantity; });
      const qtysInStock = Object.values(byIsbnQty).filter((q) => q > 0);
      Object.keys(byIsbnQty).forEach((isbn) => {
        if (byIsbnQty[isbn] <= 0) {
          const book = state.books[isbn];
          zeroStock.push({ isbn, title: book ? book.title : "", storeId: s.id, storeName: s.name });
        }
      });
      const consignmentAlertCount = lots.filter((l) => l.purchaseType === "consignment" && l.quantity > 0 && l.status === "active" && l.consignmentDeadline
        && daysBetween(today, l.consignmentDeadline) <= alertDays).length;
      return {
        storeId: s.id, storeName: s.name,
        totalTitlesInStock: qtysInStock.length,
        totalQuantityInStock: qtysInStock.reduce((sum, q) => sum + q, 0),
        consignmentAlertCount,
      };
    });
    zeroStock.sort((a, b) => (a.title || a.isbn).localeCompare(b.title || b.isbn, "ja")
      || String(a.storeName || "").localeCompare(String(b.storeName || ""), "ja"));

    // 総在庫点数・総在庫冊数(見出し数値)は全店舗の合計を示すものなので、こちらは従来通り全ロットから再集計する
    const byIsbnQtyAll = {};
    state.stockLots.forEach((l) => { byIsbnQtyAll[l.isbn] = (byIsbnQtyAll[l.isbn] || 0) + l.quantity; });

    const consignmentAlerts = state.stockLots
      .filter((l) => l.purchaseType === "consignment" && l.quantity > 0 && l.status === "active" && l.consignmentDeadline
        && daysBetween(today, l.consignmentDeadline) <= alertDays)
      .sort((a, b) => String(a.consignmentDeadline).localeCompare(String(b.consignmentDeadline)))
      .map((lot) => {
        const book = state.books[lot.isbn];
        const w = lot.wholesalerId ? wholesalersById.get(lot.wholesalerId) : null;
        const st = storesById.get(lot.storeId);
        return {
          lotId: lot.id, isbn: lot.isbn, title: book ? book.title : "", wholesalerName: w ? w.name : null,
          storeName: st ? st.name : null,
          quantity: lot.quantity, consignmentDeadline: lot.consignmentDeadline,
          daysUntilDeadline: daysBetween(today, lot.consignmentDeadline),
        };
      });

    const sinceDate = new Date();
    sinceDate.setDate(sinceDate.getDate() - bestSellerDays);
    const sinceStr = todayStrFromDate(sinceDate);
    const salesTotals = {};
    state.sales.filter((s) => s.saleDate >= sinceStr).forEach((s) => {
      salesTotals[s.isbn] = (salesTotals[s.isbn] || 0) + s.quantity;
    });
    const bestSellers = Object.keys(salesTotals)
      .map((isbn) => ({ isbn, title: (state.books[isbn] || {}).title || "", totalSold: salesTotals[isbn] }))
      .sort((a, b) => b.totalSold - a.totalSold)
      .slice(0, bestSellerLimit);

    return {
      zeroStock, consignmentAlerts, bestSellers,
      totalTitlesInStock: Object.values(byIsbnQtyAll).filter((q) => q > 0).length,
      totalQuantityInStock: Object.values(byIsbnQtyAll).filter((q) => q > 0).reduce((s, q) => s + q, 0),
      byStore,
    };
  },

  transferStock(state, req) {
    // req: { isbn, fromStoreId, toStoreId, fromLocation, toLocation, quantity, transferDate, note }
    const fromLocation = req.fromLocation === "warehouse" ? "warehouse" : "floor";
    const toLocation = req.toLocation === "warehouse" ? "warehouse" : "floor";
    if (req.fromStoreId === req.toStoreId && fromLocation === toLocation) {
      throw new Error("移動元と移動先が同じです。別の店舗、または店内/倉庫のエリアを変えて指定してください");
    }
    if (!req.quantity || req.quantity <= 0) {
      throw new Error("数量は1以上を指定してください");
    }
    const book = state.books[req.isbn];
    if (!book) throw new Error("書誌が見つかりません");

    const lots = state.stockLots
      .filter((l) => l.storeId === req.fromStoreId && l.isbn === req.isbn && l.quantity > 0 && l.status === "active" && (l.location || "floor") === fromLocation)
      .slice()
      .sort((a, b) => {
        const ka = this._lotSortKey(a), kb = this._lotSortKey(b);
        if (ka[0] !== kb[0]) return ka[0] - kb[0];
        if (ka[1] !== kb[1]) return ka[1] - kb[1];
        return String(ka[2]).localeCompare(String(kb[2]));
      });

    const availableTotal = lots.reduce((s, l) => s + l.quantity, 0);
    if (availableTotal < req.quantity) {
      throw new Error(`移動元の在庫が不足しています(移動元在庫: ${availableTotal}冊, 指定数量: ${req.quantity}冊)`);
    }

    let remaining = req.quantity;
    const transferDate = req.transferDate || todayStr();
    const movedLotPairs = [];
    const sameStore = req.fromStoreId === req.toStoreId;
    for (const lot of lots) {
      if (remaining <= 0) break;
      const take = Math.min(lot.quantity, remaining);
      lot.quantity -= take;
      if (lot.quantity === 0) lot.status = "depleted";

      const newLot = {
        id: state.nextId.stockLot++,
        storeId: req.toStoreId, isbn: req.isbn, wholesalerId: lot.wholesalerId,
        purchaseType: lot.purchaseType, quantity: take, initialQuantity: take,
        // 移動先での「入荷日」は元ロットの仕入日ではなく、実際に移動した日(transferDate)を使う
        unitCost: lot.unitCost, receivedDate: transferDate, consignmentDeadline: lot.consignmentDeadline,
        location: toLocation,
        status: "active", source: "transfer",
        note: (lot.note ? lot.note + " / " : "") + (sameStore ? "エリア移動で入荷" : "店舗間移動で入荷"),
      };
      state.stockLots.push(newLot);
      movedLotPairs.push({ fromLotId: lot.id, toLotId: newLot.id, quantity: take });
      remaining -= take;
    }

    const rec = {
      id: state.nextId.transfer++, isbn: req.isbn, fromStoreId: req.fromStoreId, toStoreId: req.toStoreId,
      fromLocation, toLocation,
      quantity: req.quantity, transferDate, note: req.note || "", lotPairs: movedLotPairs,
    };
    state.transfers.push(rec);
    return rec;
  },

  getTransferHistory(state, storeId) {
    let list = state.transfers;
    if (storeId) {
      list = list.filter((t) => t.fromStoreId === storeId || t.toStoreId === storeId);
    }
    return list.slice().sort((a, b) => b.transferDate.localeCompare(a.transferDate));
  },

  async importPurchaseCsv(state, storeId, text) {
    const rows = Csv.parse(text);
    let total = 0, success = 0;
    const errors = [], warnings = [];

    for (const row of rows) {
      total++;
      try {
        const isbn = stripCsvTextMarker(row.isbn || row.ISBN || "");
        if (!isbn) throw new Error("isbn が空です");
        const quantity = parseInt(row.quantity || row.数量 || "", 10);
        if (!quantity || quantity <= 0) throw new Error("quantity は正の整数である必要があります");

        const ptypeRaw = (row.purchase_type || row.入荷形態 || row.仕入形態 || "buy").trim();
        const purchaseType = PURCHASE_TYPE_JP[ptypeRaw];
        if (!purchaseType) throw new Error(`purchase_type の値が不正です: ${ptypeRaw}`);

        const wholesalerName = (row.wholesaler_name || row.卸会社 || "").trim();
        let wholesalerId = null;
        if (wholesalerName) {
          let w = state.wholesalers.find((x) => x.name === wholesalerName);
          if (!w) {
            w = { id: state.nextId.wholesaler++, name: wholesalerName, contact: "", note: "" };
            state.wholesalers.push(w);
            warnings.push(`${row.__line}行目: 卸会社「${wholesalerName}」を新規登録しました`);
          }
          wholesalerId = w.id;
        }

        const unitCost = parseInt(row.unit_cost || row.入荷単価 || row.仕入単価 || "0", 10) || 0;
        const receivedDate = parseFlexibleDate(row.received_date || row.入荷日) || todayStr();
        let consignmentDeadline = null;
        if (purchaseType === "consignment") {
          consignmentDeadline = parseFlexibleDate(row.consignment_deadline || row.返品期限);
          if (!consignmentDeadline) warnings.push(`${row.__line}行目: 委託ですが返品期限が未設定です`);
        }
        const priceRaw = (row.price || row.価格 || "").trim();
        const price = priceRaw ? parseInt(priceRaw, 10) : null;

        const locationRaw = (row.location || row.保管場所 || "").trim();
        const location = (locationRaw === "warehouse" || locationRaw === "倉庫") ? "warehouse" : "floor";

        await this.getOrCreateBook(state, isbn, {
          title: (row.title || row.書名 || "").trim(),
          author: (row.author || row.著者 || "").trim(),
          publisher: (row.publisher || row.出版社 || "").trim(),
          price,
        }, false);

        state.stockLots.push({
          id: state.nextId.stockLot++, storeId, isbn, wholesalerId, purchaseType,
          quantity, initialQuantity: quantity, unitCost, receivedDate, consignmentDeadline, location,
          status: "active", source: "csv_import", note: "",
        });
        success++;
      } catch (e) {
        errors.push(`${row.__line}行目: ${e.message}`);
      }
    }
    return { totalRows: total, successRows: success, errorRows: errors.length, errors, warnings };
  },

  importSalesCsv(state, storeId, text, importBatch) {
    const rows = Csv.parse(text);
    let total = 0, success = 0;
    const errors = [], warnings = [];

    for (const row of rows) {
      total++;
      try {
        const isbn = stripCsvTextMarker(row.isbn || row.ISBN || "");
        if (!isbn) throw new Error("isbn が空です");
        const quantity = parseInt(row.quantity || row.数量 || "", 10);
        if (!quantity || quantity <= 0) throw new Error("quantity は正の整数である必要があります");

        const book = state.books[isbn];
        if (!book) throw new Error(`ISBN ${isbn} は書誌未登録のためスキップしました(先に入荷登録が必要です)`);

        const saleDate = parseFlexibleDate(row.sale_date || row.販売日) || todayStr();
        const unitPriceRaw = (row.unit_price || row.販売単価 || "").trim();
        const unitPrice = unitPriceRaw ? parseInt(unitPriceRaw, 10) : book.price;

        const result = this.allocateSale(state, storeId, isbn, quantity, saleDate, unitPrice, importBatch);
        if (result.oversold) {
          warnings.push(`${row.__line}行目: ISBN ${isbn} は在庫不足のため ${result.shortfall} 冊分がマイナス計上されました`);
        }
        success++;
      } catch (e) {
        errors.push(`${row.__line}行目: ${e.message}`);
      }
    }
    return { totalRows: total, successRows: success, errorRows: errors.length, errors, warnings };
  },
};

function todayStrFromDate(d) {
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

// ============================================================
// LocalApi: 旧サーバー版のREST APIをこのブラウザ内だけで再現するルーター。
// 画面側(pages/*.js)は以前とまったく同じ Api.get/post/put/del/uploadFile
// を呼び出すだけでよく、変更の必要がない。
// ============================================================
const AppState = { state: null, saving: null };

function repairState(state) {
  // 過去のバージョンで発生していた「店舗IDの重複」を自動修復する。
  // (新規追加された店舗が既存店舗と同じIDを取得してしまうバグが過去にあり、
  //  そのデータがすでに保存されている場合にここで統合する)
  let repaired = false;
  const seenStoreIds = new Set();
  const dedupedStores = state.stores.filter((s) => {
    if (seenStoreIds.has(s.id)) { repaired = true; return false; }
    seenStoreIds.add(s.id);
    return true;
  });
  state.stores = dedupedStores;
  if (state.stores.length === 0) {
    state.stores = [{ id: 1, name: "本店", note: "" }];
    repaired = true;
  }

  // 各コレクションのID採番カウンタが実データと矛盾しないよう補正する
  // (同様の重複が二度と起きないようにするための保険)
  const maxId = (arr) => arr.reduce((m, x) => Math.max(m, x.id || 0), 0);
  const fixCounter = (key, arr) => {
    const needed = maxId(arr) + 1;
    if (!state.nextId[key] || state.nextId[key] < needed) {
      state.nextId[key] = needed;
      repaired = true;
    }
  };
  fixCounter("store", state.stores);
  fixCounter("wholesaler", state.wholesalers);
  fixCounter("tag", state.tags);
  fixCounter("bookTag", state.bookTags);
  fixCounter("stockLot", state.stockLots);
  // 保管場所(店内/倉庫)フィールドが無い旧データはすべて「店内」として補完する
  state.stockLots.forEach((l) => {
    if (l.location !== "floor" && l.location !== "warehouse") {
      l.location = "floor";
      repaired = true;
    }
  });
  fixCounter("sale", state.sales);
  fixCounter("returnRec", state.returns);
  fixCounter("stocktake", state.stocktakeEntries);
  if (!state.transfers) { state.transfers = []; repaired = true; }
  fixCounter("transfer", state.transfers);

  // パスワードログイン機能の追加に伴い、旧データにはauthフィールドを補完する
  // (これはデータ不整合の修復ではなく新機能のための初期値補完なので repaired フラグは立てない)
  if (!state.auth || typeof state.auth !== "object") {
    state.auth = { passwordHash: null, passwordSalt: null };
  }

  return { state, repaired };
}

async function ensureStateLoaded() {
  if (!AppState.state) {
    const loaded = await Db.loadState();
    const { state, repaired } = repairState(loaded || defaultState());
    AppState.state = state;
    if (!loaded || repaired) await Db.saveState(AppState.state);
    if (loaded && repaired) {
      AppState.repairNotice = "保存されていたデータの不整合(重複した店舗など)を自動修復しました";
    }
  }
  return AppState.state;
}

async function persistState() {
  await Db.saveState(AppState.state);
}

// ---- マッピングヘルパー(camelCase の内部表現 -> 画面が期待する snake_case) ----
function mapBook(b) {
  if (!b) return null;
  return {
    isbn: b.isbn, title: b.title, author: b.author, publisher: b.publisher, price: b.price,
    c_code: b.cCode, classification_text: b.classificationText, magazine_code: b.magazineCode || "",
    cover_url: b.coverUrl, is_manual_entry: b.isManualEntry,
  };
}
function mapLot(l) {
  return {
    id: l.id, isbn: l.isbn, store_id: l.storeId, store_name: l.storeName,
    wholesaler_id: l.wholesalerId, wholesaler_name: l.wholesalerName,
    purchase_type: l.purchaseType, quantity: l.quantity, initial_quantity: l.initialQuantity,
    unit_cost: l.unitCost, received_date: l.receivedDate, consignment_deadline: l.consignmentDeadline,
    location: l.location || "floor",
    status: l.status, note: l.note,
  };
}
function mapStockItem(item) {
  return {
    isbn: item.isbn, title: item.title, author: item.author, publisher: item.publisher, price: item.price,
    total_quantity: item.totalQuantity,
    floor_quantity: item.floorQuantity, warehouse_quantity: item.warehouseQuantity,
    store_names: item.storeNames || [],
    tags: item.tags,
    tags_by_store: (item.tagsByStore || []).map((x) => ({ store_id: x.storeId, store_name: x.storeName, tags: x.tags })),
    lots: item.lots.map(mapLot),
  };
}
function mapReturnCandidate(c) {
  return {
    lot_id: c.lotId, isbn: c.isbn, title: c.title, wholesaler_id: c.wholesalerId, wholesaler_name: c.wholesalerName,
    quantity: c.quantity, received_date: c.receivedDate, consignment_deadline: c.consignmentDeadline,
    location: c.location || "floor",
    days_until_deadline: c.daysUntilDeadline,
  };
}
function mapReturnHistory(r, state, wholesalersById) {
  const book = state.books[r.isbn];
  const w = r.wholesalerId
    ? (wholesalersById ? wholesalersById.get(r.wholesalerId) : state.wholesalers.find((x) => x.id === r.wholesalerId))
    : null;
  return {
    id: r.id, isbn: r.isbn, title: book ? book.title : "", wholesaler_name: w ? w.name : null,
    quantity: r.quantity, return_date: r.returnDate, note: r.note,
  };
}
function mapDashboard(d) {
  return {
    zero_stock: d.zeroStock,
    consignment_alerts: d.consignmentAlerts.map((a) => ({
      lot_id: a.lotId, isbn: a.isbn, title: a.title, wholesaler_name: a.wholesalerName,
      quantity: a.quantity, consignment_deadline: a.consignmentDeadline, days_until_deadline: a.daysUntilDeadline,
    })),
    best_sellers: d.bestSellers.map((b) => ({ isbn: b.isbn, title: b.title, total_sold: b.totalSold })),
    total_titles_in_stock: d.totalTitlesInStock,
    total_quantity_in_stock: d.totalQuantityInStock,
  };
}
function mapDashboardAll(d) {
  return {
    zero_stock: d.zeroStock.map((z) => ({ isbn: z.isbn, title: z.title, store_id: z.storeId, store_name: z.storeName })),
    consignment_alerts: d.consignmentAlerts.map((a) => ({
      lot_id: a.lotId, isbn: a.isbn, title: a.title, wholesaler_name: a.wholesalerName, store_name: a.storeName,
      quantity: a.quantity, consignment_deadline: a.consignmentDeadline, days_until_deadline: a.daysUntilDeadline,
    })),
    best_sellers: d.bestSellers.map((b) => ({ isbn: b.isbn, title: b.title, total_sold: b.totalSold })),
    total_titles_in_stock: d.totalTitlesInStock,
    total_quantity_in_stock: d.totalQuantityInStock,
    by_store: d.byStore.map((s) => ({
      store_id: s.storeId, store_name: s.storeName,
      total_titles_in_stock: s.totalTitlesInStock, total_quantity_in_stock: s.totalQuantityInStock,
      consignment_alert_count: s.consignmentAlertCount,
    })),
  };
}
function mapCsvResult(r) {
  return { total_rows: r.totalRows, success_rows: r.successRows, error_rows: r.errorRows, errors: r.errors, warnings: r.warnings };
}

const LocalApi = {
  async request(method, path, body) {
    const state = await ensureStateLoaded();
    const [rawPath, queryStr] = path.split("?");
    const qs = new URLSearchParams(queryStr || "");
    let m;

    // ---- 店舗 ----
    if (method === "GET" && rawPath === "/api/stores") return state.stores;
    if (method === "POST" && rawPath === "/api/stores") {
      if (state.stores.some((s) => s.name === body.name)) throw new Error("同名の店舗が既に存在します");
      const s = { id: state.nextId.store++, name: body.name, note: body.note || "" };
      state.stores.push(s); await persistState(); return s;
    }
    if (method === "PUT" && (m = rawPath.match(/^\/api\/stores\/(\d+)$/))) {
      const s = state.stores.find((x) => x.id === Number(m[1]));
      if (!s) throw new Error("店舗が見つかりません");
      s.name = body.name; s.note = body.note || ""; await persistState(); return s;
    }
    if (method === "DELETE" && (m = rawPath.match(/^\/api\/stores\/(\d+)$/))) {
      const id = Number(m[1]);
      if (state.stores.length <= 1) throw new Error("最後の1店舗は削除できません");
      if (!state.stores.some((s) => s.id === id)) throw new Error("店舗が見つかりません");
      const removed = {
        stockLots: state.stockLots.filter((x) => x.storeId === id).length,
        sales: state.sales.filter((x) => x.storeId === id).length,
        returns: state.returns.filter((x) => x.storeId === id).length,
        stocktakeEntries: state.stocktakeEntries.filter((x) => x.storeId === id).length,
        bookTags: state.bookTags.filter((x) => x.storeId === id).length,
      };
      state.stockLots = state.stockLots.filter((x) => x.storeId !== id);
      state.sales = state.sales.filter((x) => x.storeId !== id);
      state.returns = state.returns.filter((x) => x.storeId !== id);
      state.stocktakeEntries = state.stocktakeEntries.filter((x) => x.storeId !== id);
      state.bookTags = state.bookTags.filter((x) => x.storeId !== id);
      state.stores = state.stores.filter((s) => s.id !== id);
      await persistState();
      return { ok: true, removed };
    }

    // ---- 卸会社 ----
    if (method === "GET" && rawPath === "/api/wholesalers") return state.wholesalers;
    if (method === "POST" && rawPath === "/api/wholesalers") {
      if (state.wholesalers.some((w) => w.name === body.name)) throw new Error("同名の卸会社が既に存在します");
      const w = { id: state.nextId.wholesaler++, name: body.name, contact: body.contact || "", note: body.note || "" };
      state.wholesalers.push(w); await persistState(); return w;
    }
    if (method === "PUT" && (m = rawPath.match(/^\/api\/wholesalers\/(\d+)$/))) {
      const w = state.wholesalers.find((x) => x.id === Number(m[1]));
      if (!w) throw new Error("卸会社が見つかりません");
      w.name = body.name; w.contact = body.contact || ""; w.note = body.note || ""; await persistState(); return w;
    }
    if (method === "DELETE" && (m = rawPath.match(/^\/api\/wholesalers\/(\d+)$/))) {
      const id = Number(m[1]);
      if (!state.wholesalers.some((w) => w.id === id)) throw new Error("卸会社が見つかりません");
      let detachedLots = 0, detachedReturns = 0;
      state.stockLots.forEach((l) => { if (l.wholesalerId === id) { l.wholesalerId = null; detachedLots++; } });
      state.returns.forEach((r) => { if (r.wholesalerId === id) { r.wholesalerId = null; detachedReturns++; } });
      state.wholesalers = state.wholesalers.filter((w) => w.id !== id);
      await persistState();
      return { ok: true, detachedLots, detachedReturns };
    }

    // ---- 書誌 ----
    if (method === "GET" && rawPath === "/api/books/search") {
      const q = (qs.get("q") || "").toLowerCase();
      let list = Object.values(state.books);
      if (q) {
        list = list.filter((b) => `${b.isbn} ${b.title} ${b.author} ${b.publisher}`.toLowerCase().includes(q));
      }
      list = list.slice().sort((a, b) => (a.title || "").localeCompare(b.title || "", "ja")).slice(0, 100);
      return list.map(mapBook);
    }
    if (method === "GET" && (m = rawPath.match(/^\/api\/books\/([^/]+)$/))) {
      const book = state.books[decodeURIComponent(m[1])];
      if (!book) throw new Error("書誌が見つかりません");
      return mapBook(book);
    }
    if (method === "POST" && rawPath === "/api/books") {
      const isbn = body.isbn;
      state.books[isbn] = {
        isbn, title: body.title || "", author: body.author || "", publisher: body.publisher || "",
        price: body.price || 0, cCode: body.c_code || "", classificationText: body.classification_text || "",
        magazineCode: body.magazine_code || "", coverUrl: body.cover_url || "", isManualEntry: !!body.is_manual_entry,
      };
      await persistState();
      return mapBook(state.books[isbn]);
    }
    if (method === "DELETE" && (m = rawPath.match(/^\/api\/books\/([^/]+)$/))) {
      const isbn = decodeURIComponent(m[1]);
      if (!state.books[isbn]) throw new Error("書誌が見つかりません");
      const removed = {
        stockLots: state.stockLots.filter((x) => x.isbn === isbn).length,
        sales: state.sales.filter((x) => x.isbn === isbn).length,
        returns: state.returns.filter((x) => x.isbn === isbn).length,
        stocktakeEntries: state.stocktakeEntries.filter((x) => x.isbn === isbn).length,
        bookTags: state.bookTags.filter((x) => x.isbn === isbn).length,
      };
      state.stockLots = state.stockLots.filter((x) => x.isbn !== isbn);
      state.sales = state.sales.filter((x) => x.isbn !== isbn);
      state.returns = state.returns.filter((x) => x.isbn !== isbn);
      state.stocktakeEntries = state.stocktakeEntries.filter((x) => x.isbn !== isbn);
      state.bookTags = state.bookTags.filter((x) => x.isbn !== isbn);
      delete state.books[isbn];
      await persistState();
      return { ok: true, removed };
    }
    if (method === "POST" && rawPath === "/api/books/scan") {
      const parsed = Barcode.identify(body.code);
      if (parsed.kind === "isbn") {
        const isbn = parsed.isbn13;
        if (!Barcode.ean13ChecksumValid(isbn)) {
          return { kind: "isbn", isbn, warning: "チェックデジットが一致しません。読み取りを確認してください。", book: null };
        }
        const local = state.books[isbn];
        if (local) return { kind: "isbn", isbn, book: mapBook(local), found_in: "local" };
        const info = await OpenBd.fetchBookInfo(isbn);
        if (info) {
          return {
            kind: "isbn", isbn, found_in: "openbd",
            book: {
              isbn, title: info.title || "", author: info.author || "", publisher: info.publisher || "",
              price: info.price || 0, c_code: "", classification_text: "", cover_url: info.coverUrl || "", is_manual_entry: false,
            },
          };
        }
        return { kind: "isbn", isbn, book: null, found_in: "none" };
      }
      if (parsed.kind === "price") {
        return { kind: "price", c_code: parsed.cCode, price: parsed.price, classification_text: parsed.classificationText };
      }
      return { kind: "unknown", raw: body.code };
    }

    // ---- タグ ----
    if (method === "GET" && rawPath === "/api/tags") return state.tags;
    if (method === "POST" && rawPath === "/api/tags") {
      let tag = state.tags.find((t) => t.name === body.name);
      if (!tag) { tag = { id: state.nextId.tag++, name: body.name }; state.tags.push(tag); await persistState(); }
      return tag;
    }
    if (method === "PUT" && (m = rawPath.match(/^\/api\/tags\/(\d+)$/))) {
      const tag = state.tags.find((t) => t.id === Number(m[1]));
      if (!tag) throw new Error("タグが見つかりません");
      if (state.tags.some((t) => t.name === body.name && t.id !== tag.id)) throw new Error("同名のタグが既に存在します");
      tag.name = body.name;
      await persistState();
      return tag;
    }
    if (method === "DELETE" && (m = rawPath.match(/^\/api\/tags\/(\d+)$/))) {
      const id = Number(m[1]);
      if (!state.tags.some((t) => t.id === id)) throw new Error("タグが見つかりません");
      const removedLinks = state.bookTags.filter((bt) => bt.tagId === id).length;
      state.bookTags = state.bookTags.filter((bt) => bt.tagId !== id);
      state.tags = state.tags.filter((t) => t.id !== id);
      await persistState();
      return { ok: true, removedLinks };
    }
    if (method === "GET" && (m = rawPath.match(/^\/api\/stores\/(\d+)\/books\/([^/]+)\/tags$/))) {
      const storeId = Number(m[1]), isbn = decodeURIComponent(m[2]);
      const tagIds = state.bookTags.filter((bt) => bt.storeId === storeId && bt.isbn === isbn).map((bt) => bt.tagId);
      return state.tags.filter((t) => tagIds.includes(t.id));
    }
    if (method === "POST" && (m = rawPath.match(/^\/api\/stores\/(\d+)\/books\/([^/]+)\/tags$/))) {
      const storeId = Number(m[1]), isbn = decodeURIComponent(m[2]);
      if (!state.books[isbn]) throw new Error("書誌が見つかりません");
      let tag = state.tags.find((t) => t.name === body.tag_name);
      if (!tag) { tag = { id: state.nextId.tag++, name: body.tag_name }; state.tags.push(tag); }
      const exists = state.bookTags.some((bt) => bt.storeId === storeId && bt.isbn === isbn && bt.tagId === tag.id);
      if (!exists) {
        state.bookTags.push({ id: state.nextId.bookTag++, storeId, isbn, tagId: tag.id });
        await persistState();
      }
      return { ok: true, tag };
    }
    if (method === "DELETE" && (m = rawPath.match(/^\/api\/stores\/(\d+)\/books\/([^/]+)\/tags\/(\d+)$/))) {
      const storeId = Number(m[1]), isbn = decodeURIComponent(m[2]), tagId = Number(m[3]);
      state.bookTags = state.bookTags.filter((bt) => !(bt.storeId === storeId && bt.isbn === isbn && bt.tagId === tagId));
      await persistState();
      return { ok: true };
    }

    // ---- 在庫/入荷 ----
    if (method === "GET" && (m = rawPath.match(/^\/api\/stores\/(\d+)\/stock$/))) {
      const storeId = Number(m[1]);
      return Crud.getStockSummary(state, storeId, qs.get("q") || null).map(mapStockItem);
    }
    if (method === "POST" && (m = rawPath.match(/^\/api\/stores\/(\d+)\/stock\/receive$/))) {
      const storeId = Number(m[1]);
      if (body.purchase_type === "consignment" && !body.consignment_deadline) {
        throw new Error("委託の場合は返品期限(consignment_deadline)を指定してください");
      }
      const req = {
        isbn: body.isbn, wholesalerId: body.wholesaler_id || null, purchaseType: body.purchase_type,
        quantity: body.quantity, unitCost: body.unit_cost || 0, receivedDate: body.received_date || null,
        consignmentDeadline: body.consignment_deadline || null, note: body.note || "",
        title: body.title, author: body.author, publisher: body.publisher, price: body.price,
        location: body.location === "warehouse" ? "warehouse" : "floor",
      };
      const lot = await Crud.receiveStock(state, storeId, req);
      await persistState();
      const w = lot.wholesalerId ? state.wholesalers.find((x) => x.id === lot.wholesalerId) : null;
      const st = state.stores.find((x) => x.id === lot.storeId);
      return mapLot({ ...lot, wholesalerName: w ? w.name : null, storeName: st ? st.name : null });
    }

    // ---- 在庫(全店舗横断) ----
    if (method === "GET" && rawPath === "/api/stock") {
      return Crud.getStockSummary(state, null, qs.get("q") || null).map(mapStockItem);
    }

    // ---- 販売 ----
    if (method === "GET" && (m = rawPath.match(/^\/api\/stores\/(\d+)\/sales$/))) {
      const storeId = Number(m[1]);
      const days = Number(qs.get("days") || "30");
      const since = new Date(); since.setDate(since.getDate() - days);
      const sinceStr = todayStrFromDate(since);
      return state.sales
        .filter((s) => s.storeId === storeId && s.saleDate >= sinceStr)
        .slice()
        .sort((a, b) => b.saleDate.localeCompare(a.saleDate))
        .map((r) => ({
          id: r.id, isbn: r.isbn, title: (state.books[r.isbn] || {}).title || "", quantity: r.quantity,
          sale_date: r.saleDate, unit_price: r.unitPrice, oversold: r.oversold,
        }));
    }
    if (method === "GET" && rawPath === "/api/sales") {
      const days = Number(qs.get("days") || "30");
      const since = new Date(); since.setDate(since.getDate() - days);
      const sinceStr = todayStrFromDate(since);
      const storesById = new Map(state.stores.map((s) => [s.id, s]));
      return state.sales
        .filter((s) => s.saleDate >= sinceStr)
        .slice()
        .sort((a, b) => b.saleDate.localeCompare(a.saleDate))
        .map((r) => {
          const st = storesById.get(r.storeId);
          return {
            id: r.id, isbn: r.isbn, title: (state.books[r.isbn] || {}).title || "", quantity: r.quantity,
            sale_date: r.saleDate, unit_price: r.unitPrice, oversold: r.oversold,
            store_id: r.storeId, store_name: st ? st.name : null,
          };
        });
    }

    // ---- 返品 ----
    if (method === "GET" && (m = rawPath.match(/^\/api\/stores\/(\d+)\/returns\/candidates$/))) {
      const storeId = Number(m[1]);
      return Crud.getReturnCandidates(state, storeId).map(mapReturnCandidate);
    }
    if (method === "POST" && (m = rawPath.match(/^\/api\/stores\/(\d+)\/returns$/))) {
      const storeId = Number(m[1]);
      const rec = Crud.processReturn(state, storeId, {
        lotId: body.lot_id, quantity: body.quantity, returnDate: body.return_date || null, note: body.note || "",
      });
      await persistState();
      return mapReturnHistory(rec, state);
    }
    if (method === "GET" && (m = rawPath.match(/^\/api\/stores\/(\d+)\/returns\/history$/))) {
      const storeId = Number(m[1]);
      const wholesalersById = new Map(state.wholesalers.map((w) => [w.id, w]));
      return state.returns.filter((r) => r.storeId === storeId)
        .slice().sort((a, b) => b.returnDate.localeCompare(a.returnDate))
        .map((r) => mapReturnHistory(r, state, wholesalersById));
    }

    // ---- 棚卸 ----
    if (method === "GET" && (m = rawPath.match(/^\/api\/stores\/(\d+)\/stocktake\/current$/))) {
      const storeId = Number(m[1]);
      return Crud.getStocktakeRows(state, storeId).map((r) => ({ isbn: r.isbn, title: r.title, system_qty: r.systemQty }));
    }
    if (method === "POST" && (m = rawPath.match(/^\/api\/stores\/(\d+)\/stocktake$/))) {
      const storeId = Number(m[1]);
      const result = Crud.processStocktake(state, storeId, {
        isbn: body.isbn, countedQty: body.counted_qty, takenDate: body.taken_date || null, note: body.note || "",
      });
      await persistState();
      return { isbn: result.isbn, system_qty: result.systemQty, counted_qty: result.countedQty, diff: result.diff };
    }
    if (method === "GET" && (m = rawPath.match(/^\/api\/stores\/(\d+)\/stocktake\/history$/))) {
      const storeId = Number(m[1]);
      return state.stocktakeEntries.filter((e) => e.storeId === storeId)
        .slice().sort((a, b) => b.takenDate.localeCompare(a.takenDate)).slice(0, 200)
        .map((e) => ({
          isbn: e.isbn, title: (state.books[e.isbn] || {}).title || "", system_qty: e.systemQty,
          counted_qty: e.countedQty, diff: e.diff, taken_date: e.takenDate, note: e.note,
        }));
    }

    // ---- 店舗間移動 ----
    if (method === "POST" && rawPath === "/api/transfers") {
      let rec;
      try {
        rec = Crud.transferStock(state, {
          isbn: body.isbn, fromStoreId: body.from_store_id, toStoreId: body.to_store_id,
          fromLocation: body.from_location, toLocation: body.to_location,
          quantity: body.quantity, transferDate: body.transfer_date || null, note: body.note || "",
        });
      } catch (e) {
        throw e;
      }
      await persistState();
      const book = state.books[rec.isbn];
      const fromStore = state.stores.find((s) => s.id === rec.fromStoreId);
      const toStore = state.stores.find((s) => s.id === rec.toStoreId);
      return {
        id: rec.id, isbn: rec.isbn, title: book ? book.title : "",
        from_store_id: rec.fromStoreId, from_store_name: fromStore ? fromStore.name : null,
        to_store_id: rec.toStoreId, to_store_name: toStore ? toStore.name : null,
        from_location: rec.fromLocation, to_location: rec.toLocation,
        quantity: rec.quantity, transfer_date: rec.transferDate, note: rec.note,
      };
    }
    if (method === "GET" && rawPath === "/api/transfers/history") {
      const storeIdParam = qs.get("store_id");
      const storeId = storeIdParam ? Number(storeIdParam) : null;
      const list = Crud.getTransferHistory(state, storeId);
      return list.map((t) => {
        const book = state.books[t.isbn];
        const fromStore = state.stores.find((s) => s.id === t.fromStoreId);
        const toStore = state.stores.find((s) => s.id === t.toStoreId);
        return {
          id: t.id, isbn: t.isbn, title: book ? book.title : "",
          from_store_id: t.fromStoreId, from_store_name: fromStore ? fromStore.name : null,
          to_store_id: t.toStoreId, to_store_name: toStore ? toStore.name : null,
          from_location: t.fromLocation || "floor", to_location: t.toLocation || "floor",
          quantity: t.quantity, transfer_date: t.transferDate, note: t.note,
        };
      });
    }

    // ---- ダッシュボード ----
    if (method === "GET" && (m = rawPath.match(/^\/api\/stores\/(\d+)\/dashboard$/))) {
      const storeId = Number(m[1]);
      return mapDashboard(Crud.getDashboard(state, storeId));
    }
    if (method === "GET" && rawPath === "/api/dashboard") {
      return mapDashboardAll(Crud.getDashboardAll(state));
    }

    throw new Error(`未対応のAPIです: ${method} ${rawPath}`);
  },

  async handleUpload(path, file) {
    const state = await ensureStateLoaded();
    const buf = await file.arrayBuffer();
    const text = Csv.decodeArrayBuffer(buf);
    let m;
    if ((m = path.match(/^\/api\/stores\/(\d+)\/stock\/import-purchase-csv$/))) {
      const result = await Crud.importPurchaseCsv(state, Number(m[1]), text);
      await persistState();
      return mapCsvResult(result);
    }
    if ((m = path.match(/^\/api\/stores\/(\d+)\/sales\/import-csv$/))) {
      const batch = `import-${Date.now()}`;
      const result = Crud.importSalesCsv(state, Number(m[1]), text, batch);
      await persistState();
      return mapCsvResult(result);
    }
    throw new Error(`未対応のアップロード先です: ${path}`);
  },
};

// ============================================================
// Api: 画面側から見たインターフェースは以前のサーバー版と同じ。
// 内部ではネットワーク通信の代わりに LocalApi(このブラウザ内のデータ)を呼び出す。
// ============================================================
const Api = {
  async request(method, path, body) {
    try {
      return await LocalApi.request(method, path, body);
    } catch (e) {
      const err = new Error(e.message || String(e));
      throw err;
    }
  },
  get(path) { return this.request("GET", path); },
  post(path, body) { return this.request("POST", path, body); },
  put(path, body) { return this.request("PUT", path, body); },
  del(path) { return this.request("DELETE", path); },

  async uploadFile(path, file) {
    return LocalApi.handleUpload(path, file);
  },
};

// 共通ユーティリティ
const Util = {
  escapeHtml(str) {
    if (str === null || str === undefined) return "";
    return String(str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  },
  fmtDate(d) {
    if (!d) return "";
    return String(d).slice(0, 10);
  },
  fmtYen(n) {
    if (n === null || n === undefined) return "";
    return Number(n).toLocaleString("ja-JP") + "円";
  },
  todayStr() {
    const d = new Date();
    return d.toISOString().slice(0, 10);
  },
  purchaseTypeLabel(t) {
    if (t === "buy") return "買切";
    if (t === "consignment") return "委託";
    if (t === "adjustment") return "調整";
    return t;
  },
  purchaseTypeBadgeClass(t) {
    if (t === "buy") return "badge badge-buy";
    if (t === "consignment") return "badge badge-consignment";
    return "badge badge-adjustment";
  },
  locationLabel(loc) {
    return loc === "warehouse" ? "倉庫" : "店内";
  },
  locationBadgeClass(loc) {
    return loc === "warehouse" ? "badge badge-warehouse" : "badge badge-floor";
  },
  toast(message, kind) {
    const container = document.getElementById("toast-container");
    const el = document.createElement("div");
    el.className = "toast" + (kind ? " " + kind : "");
    el.textContent = message;
    container.appendChild(el);
    setTimeout(() => el.remove(), 4500);
  },
};

// ============================================================
// ページネーション共通ヘルパー
// 各ページ(ダッシュボード・販売履歴・返品管理・棚卸など)の一覧テーブルで
// 「表示件数」セレクト(20/50/100/200/すべて)とページ送りを共通化するためのもの。
// 選択した表示件数は localStorage に保存され、次回以降も引き継がれる。
// ============================================================
const Pagination = {
  sizeOptions: [20, 50, 100, 200],

  loadPageSize(key, defaultSize) {
    defaultSize = defaultSize || 50;
    const stored = localStorage.getItem(key);
    if (stored === "all") return "all";
    const n = parseInt(stored || String(defaultSize), 10);
    return this.sizeOptions.includes(n) ? n : defaultSize;
  },

  // items配列とページ状態(state: {pageSize, currentPage})から、表示対象の抜き出しと表示範囲情報を返す
  slice(items, state) {
    const total = items.length;
    const totalPages = state.pageSize === "all" ? 1 : Math.max(1, Math.ceil(total / state.pageSize));
    if (state.currentPage > totalPages) state.currentPage = totalPages;
    if (state.currentPage < 1) state.currentPage = 1;
    const startIdx = state.pageSize === "all" ? 0 : (state.currentPage - 1) * state.pageSize;
    const endIdx = state.pageSize === "all" ? total : Math.min(startIdx + state.pageSize, total);
    return { pageItems: items.slice(startIdx, endIdx), total, totalPages, startIdx, endIdx };
  },

  // 「表示件数」セレクトのHTML
  pageSizeSelectHtml(idPrefix, pageSize) {
    return `
      <label class="stock-pagesize">表示件数
        <select id="${idPrefix}-page-size">
          ${this.sizeOptions.map((n) => `<option value="${n}" ${pageSize === n ? "selected" : ""}>${n}件</option>`).join("")}
          <option value="all" ${pageSize === "all" ? "selected" : ""}>すべて</option>
        </select>
      </label>
    `;
  },

  // 件数表示("N件中 X-Y件を表示")のHTML(pタグ中身のみ)
  countLabel(total, startIdx, endIdx) {
    return `${total}件中 ${total ? startIdx + 1 : 0}-${endIdx}件を表示`;
  },

  // ページ送りボタンのHTML(1ページしかない場合は空文字)
  controlsHtml(idPrefix, currentPage, totalPages) {
    if (totalPages <= 1) return "";
    return `
      <div class="stock-pagination">
        <button class="small secondary" id="${idPrefix}-page-prev" ${currentPage <= 1 ? "disabled" : ""}>◀ 前へ</button>
        <span class="stock-pagination-label">${currentPage} / ${totalPages} ページ</span>
        <button class="small secondary" id="${idPrefix}-page-next" ${currentPage >= totalPages ? "disabled" : ""}>次へ ▶</button>
      </div>
    `;
  },

  // セレクト・前へ/次へボタンにイベントを配線する
  // state: {pageSize, currentPage} を持つオブジェクト、storageKeyはlocalStorageキー、onChangeは再描画コールバック
  wire(idPrefix, state, storageKey, onChange) {
    const sel = document.getElementById(`${idPrefix}-page-size`);
    if (sel) {
      sel.onchange = (e) => {
        state.pageSize = e.target.value === "all" ? "all" : parseInt(e.target.value, 10);
        localStorage.setItem(storageKey, String(state.pageSize));
        state.currentPage = 1;
        onChange();
      };
    }
    const prevBtn = document.getElementById(`${idPrefix}-page-prev`);
    if (prevBtn) prevBtn.onclick = () => { state.currentPage--; onChange(); };
    const nextBtn = document.getElementById(`${idPrefix}-page-next`);
    if (nextBtn) nextBtn.onclick = () => { state.currentPage++; onChange(); };
  },
};

// 店舗の状態管理
// (画面上部の店舗切替プルダウンは廃止し、全店舗のデータを横断して表示する方針に変更。
//  ただし入荷登録・棚卸・返品管理など「対象店舗」を選ぶ必要がある画面のために、
//  最後に使った店舗をデフォルト値として覚えておく目的でcurrentStoreIdは残す)
const StoreState = {
  stores: [],
  currentStoreId: null,

  async init() {
    this.stores = await Api.get("/api/stores");
    if (this.stores.length === 0) {
      const created = await Api.post("/api/stores", { name: "本店", note: "" });
      this.stores = [created];
    }
    const saved = localStorage.getItem("currentStoreId");
    const savedId = saved ? parseInt(saved, 10) : null;
    if (savedId && this.stores.some((s) => s.id === savedId)) {
      this.currentStoreId = savedId;
    } else {
      this.currentStoreId = this.stores[0].id;
    }
  },

  // 各画面の店舗選択プルダウンで、ユーザーが選んだ店舗を「次回以降のデフォルト」として覚えておく
  setCurrentStore(storeId) {
    this.currentStoreId = storeId;
    localStorage.setItem("currentStoreId", storeId);
  },

  getCurrentStore() {
    return this.stores.find((s) => s.id === this.currentStoreId);
  },

  async refreshStores() {
    this.stores = await Api.get("/api/stores");
    if (!this.stores.some((s) => s.id === this.currentStoreId)) {
      // 選択中だった店舗が削除された場合は先頭の店舗に切り替える
      this.currentStoreId = this.stores[0].id;
      localStorage.setItem("currentStoreId", this.currentStoreId);
    }
  },
};
