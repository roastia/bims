      const next1 = document.getElementById("pw-change-new").value;
      const next2 = document.getElementById("pw-change-new2").value;
      if (next1.length < 4) { Util.toast("新しいパスワードは4文字以上で設定してください", "warning"); return; }
      if (next1 !== next2) { Util.toast("新しいパスワードが一致しません", "warning"); return; }
      try {
        await AuthGate.changePassword(current, next1);
        Util.toast("パスワードを変更しました", "success");
        document.getElementById("pw-change-current").value = "";
        document.getElementById("pw-change-new").value = "";
        document.getElementById("pw-change-new2").value = "";
      } catch (e) {
        Util.toast("パスワード変更に失敗しました: " + e.message, "error");
      }
    };

    document.getElementById("export-btn").onclick = () => {
      const json = JSON.stringify(AppState.state, null, 2);
      const today = todayStr().replace(/-/g, "");
      const blob = new Blob([json], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `bookstore_backup_${today}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      Util.toast("エクスポートしました", "success");
    };

    document.getElementById("import-btn").onclick = async () => {
      const fileInput = document.getElementById("import-file");
      if (!fileInput.files.length) { Util.toast("JSONファイルを選択してください", "warning"); return; }
      const ok = window.confirm("現在保存されているデータはすべて上書きされます。よろしいですか?");
      if (!ok) return;
      try {
        const text = await fileInput.files[0].text();
        const parsed = JSON.parse(text);
        if (!parsed || !parsed.stores || !parsed.books) {
          throw new Error("このファイルはバックアップ形式として認識できませんでした");
        }
        AppState.state = parsed;
        await persistState();
        Util.toast("インポートしました。画面を再読み込みします", "success");
        setTimeout(() => location.reload(), 800);
      } catch (e) {
        Util.toast("インポートに失敗しました: " + e.message, "error");
      }
    };
  },
};

// ============================================================
// チャート描画ヘルパー: 在庫・販売などのデータを可視化する
// 外部ライブラリを使わず、HTML/CSSのバーとSVGの円グラフ・折れ線グラフで表現する
// ダッシュボード画面(10_page_dashboard.js)から利用される
// ============================================================
const Charts = {
  palette: ["#2c5f8a", "#d97b3f", "#2e7d4f", "#b8860b", "#6a3fa0", "#c0392b", "#3a8fb7", "#8a6d3b", "#5a8f5a", "#a45a8f"],

  donutSvg(data, opts) {
    opts = opts || {};
    const size = opts.size || 160;
    const thickness = opts.thickness || 26;
    const r = (size - thickness) / 2;
    const cx = size / 2, cy = size / 2;
    const circumference = 2 * Math.PI * r;
    const total = data.reduce((s, d) => s + d.value, 0);
    if (total <= 0) return `<p class="empty-msg">データがありません</p>`;

    let offset = 0;
    const circles = data.filter((d) => d.value > 0).map((d) => {
      const frac = d.value / total;
      const segLen = frac * circumference;
      const dashoffset = -offset;
      offset += segLen;
      return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${thickness}" stroke-dasharray="${segLen.toFixed(2)} ${(circumference - segLen).toFixed(2)}" stroke-dashoffset="${dashoffset.toFixed(2)}"></circle>`;
    }).join("");

    const legend = data.map((d) => {
      const pct = total > 0 ? Math.round((d.value / total) * 100) : 0;
      return `<div class="chart-legend-row"><span class="chart-legend-dot" style="background:${d.color}"></span>${Util.escapeHtml(d.label)}: ${d.value} (${pct}%)</div>`;
    }).join("");

    return `
      <div class="chart-donut-wrap">
        <svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
          <g transform="rotate(-90 ${cx} ${cy})">${circles}</g>
        </svg>
        <div class="chart-legend">${legend}</div>
      </div>
    `;
  },

  barChartHtml(data, opts) {
    opts = opts || {};
    const color = opts.color || "var(--primary)";
    const unit = opts.unit || "";
    if (!data.length) return `<p class="empty-msg">データがありません</p>`;
    const max = Math.max(...data.map((d) => d.value), 1);
    return `
      <div class="chart-bar-list">
        ${data.map((d) => `
          <div class="chart-bar-row">
            <div class="chart-bar-label" title="${Util.escapeHtml(d.label)}">${Util.escapeHtml(d.label)}</div>
            <div class="chart-bar-track">
              <div class="chart-bar-fill" style="width:${Math.max((d.value / max) * 100, 2)}%; background:${color};"></div>
            </div>
            <div class="chart-bar-value">${d.value}${unit}</div>
          </div>
        `).join("")}
      </div>
    `;
  },

  lineSvg(data, opts) {
    opts = opts || {};
    const width = opts.width || 640, height = opts.height || 180;
    const color = opts.color || "#2c5f8a";
    const padding = 26;
    if (!data.length) return `<p class="empty-msg">データがありません</p>`;

    const values = data.map((d) => d.value);
    const maxV = Math.max(...values, 1);
    const stepX = data.length > 1 ? (width - padding * 2) / (data.length - 1) : 0;
    const points = data.map((d, i) => {
      const x = padding + i * stepX;
      const y = height - padding - (d.value / maxV) * (height - padding * 2);
      return { x, y };
    });
    const polylineStr = points.map((p) => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
    const labelStep = Math.max(1, Math.ceil(data.length / 6));
    const xLabels = data.map((d, i) => (i % labelStep === 0 || i === data.length - 1)
      ? `<text x="${points[i].x.toFixed(1)}" y="${height - 6}" font-size="9" fill="#8a94a0" text-anchor="middle">${Util.escapeHtml(d.label)}</text>`
      : "").join("");
    const circles = points.map((p) => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.5" fill="${color}"></circle>`).join("");

    return `
      <svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" preserveAspectRatio="xMidYMid meet">
        <line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="#dde1e6" stroke-width="1"></line>
        <polyline points="${polylineStr}" fill="none" stroke="${color}" stroke-width="2"></polyline>
        ${circles}
        ${xLabels}
      </svg>
    `;
  },
};

const PageStock = {
  expandedIds: {},
  currentPage: 1,
  lastQuery: null,
  currentQuery: "",
  searchDebounceTimer: null,
  searchToken: 0,
  pageSize: (() => {
    const stored = localStorage.getItem("stock_page_size");
    if (stored === "all") return "all";
    const n = parseInt(stored || "50", 10);
    return [20, 50, 100, 200].includes(n) ? n : 50;
  })(),

  async render(root, params) {
    const q = (params && params.q) || "";
    this.currentQuery = q;
    if (this.lastQuery !== q) {
      this.currentPage = 1;
      this.lastQuery = q;
    }

    root.innerHTML = `
      <h1>在庫一覧</h1>
      <p class="subtitle">全店舗の在庫を横断して表示します。書名・著者・出版社・ISBN・タグ・店舗・卸会社で絞り込めます。入力すると自動的にリアルタイムで絞り込まれます。</p>

      <div class="card">
        <div class="form-inline">
          <div class="form-row" style="flex:1; min-width:220px;">
            <label>書名・著者・出版社・ISBN・タグ・店舗・卸会社で検索(スペース区切りで複数ワード検索も可能)</label>
            <input type="text" id="stock-search" value="${Util.escapeHtml(q)}" placeholder="例: 文庫 日販">
          </div>
          <button id="stock-search-btn">検索</button>
        </div>
      </div>

      <div id="stock-list"><p class="loading">読み込み中...</p></div>
    `;

    const searchInput = document.getElementById("stock-search");
    const runSearch = () => {
      const val = searchInput.value;
      this.currentQuery = val;
      this.currentPage = 1;
      const hash = "#/stock" + (val ? "?q=" + encodeURIComponent(val) : "");
      if (window.location.hash !== hash) {
        window.history.replaceState(null, "", hash);
      }
      this.loadAndRenderList(root, params);
    };
    searchInput.addEventListener("input", () => {
      clearTimeout(this.searchDebounceTimer);
      this.searchDebounceTimer = setTimeout(runSearch, 250);
    });
    document.getElementById("stock-search-btn").onclick = () => {
      clearTimeout(this.searchDebounceTimer);
      runSearch();
    };
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        clearTimeout(this.searchDebounceTimer);
        runSearch();
      }
    });

    await this.loadAndRenderList(root, params);
  },

  async loadAndRenderList(root, params) {
    const listEl = document.getElementById("stock-list");
    const q = this.currentQuery || "";
    const myToken = ++this.searchToken;

    let items;
    try {
      items = await Api.get(`/api/stock?q=${encodeURIComponent(q)}`);
    } catch (e) {
      if (myToken !== this.searchToken) return;
      listEl.innerHTML = `<p class="error-msg">読み込みに失敗しました: ${Util.escapeHtml(e.message)}</p>`;
      return;
    }
    // タイピング中に古い検索結果が新しい結果を上書きしてしまわないようにする
    if (myToken !== this.searchToken) return;

    if (items.length === 0) {
      listEl.innerHTML = `<p class="empty-msg">該当する在庫がありません</p>`;
      return;
    }

    const total = items.length;
    const totalPages = this.pageSize === "all" ? 1 : Math.max(1, Math.ceil(total / this.pageSize));
    if (this.currentPage > totalPages) this.currentPage = totalPages;
    if (this.currentPage < 1) this.currentPage = 1;
    const startIdx = this.pageSize === "all" ? 0 : (this.currentPage - 1) * this.pageSize;
    const endIdx = this.pageSize === "all" ? total : Math.min(startIdx + this.pageSize, total);
    const pageItems = items.slice(startIdx, endIdx);

    const pageSizeOptions = [20, 50, 100, 200];
    const pageSizeSelectHtml = `
      <label class="stock-pagesize">表示件数
        <select id="stock-page-size">
          ${pageSizeOptions.map((n) => `<option value="${n}" ${this.pageSize === n ? "selected" : ""}>${n}件</option>`).join("")}
          <option value="all" ${this.pageSize === "all" ? "selected" : ""}>すべて</option>
        </select>
      </label>
    `;

    const paginationHtml = totalPages > 1 ? `
      <div class="stock-pagination">
        <button class="small secondary" id="stock-page-prev" ${this.currentPage <= 1 ? "disabled" : ""}>◀ 前へ</button>
        <span class="stock-pagination-label">${this.currentPage} / ${totalPages} ページ</span>
        <button class="small secondary" id="stock-page-next" ${this.currentPage >= totalPages ? "disabled" : ""}>次へ ▶</button>
      </div>
    ` : "";

    // 行のHTML(コンパクトな1行分)だけを先に組み立てる。
    // 詳細パネルの中身(店舗別タグ・ロット内訳)は展開時に初めて生成する(遅延描画)。
    // 件数が多いとき(数千件規模)に初期表示が重くならないようにするための対策。
    listEl.innerHTML = `
      <div class="stock-list-toolbar">
        <p class="stock-count">${total}件中 ${total ? startIdx + 1 : 0}-${endIdx}件を表示</p>
        ${pageSizeSelectHtml}
      </div>
      <div class="stock-table-wrap">
        <table class="stock-table">
          <thead>
            <tr>
              <th>書名</th>
              <th>著者</th>
              <th>出版社</th>
              <th>卸会社</th>
              <th class="num">本体価格(税別)</th>
              <th>店舗</th>
              <th class="num">店内在庫</th>
              <th class="num">倉庫在庫</th>
              <th>タグ</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${pageItems.map((item) => this.renderRow(item)).join("")}
          </tbody>
        </table>
      </div>
      ${paginationHtml}
    `;

    document.getElementById("stock-page-size").onchange = (e) => {
      this.pageSize = e.target.value === "all" ? "all" : parseInt(e.target.value, 10);
      localStorage.setItem("stock_page_size", String(this.pageSize));
      this.currentPage = 1;
      this.loadAndRenderList(root, params);
    };
    const prevBtn = document.getElementById("stock-page-prev");
    if (prevBtn) prevBtn.onclick = () => { this.currentPage--; this.loadAndRenderList(root, params); };
    const nextBtn = document.getElementById("stock-page-next");
    if (nextBtn) nextBtn.onclick = () => { this.currentPage++; this.loadAndRenderList(root, params); };

    pageItems.forEach((item) => {
      const id = cssId(item.isbn);
      const toggleBtn = document.getElementById(`toggle-${id}`);
      const mainRow = document.getElementById(`row-${id}`);
      const detailRow = document.getElementById(`detail-${id}`);
      const toggle = () => {
        const isOpen = detailRow.style.display !== "none";
        if (!isOpen) this.ensureDetailRendered(item, root, params, detailRow);
        detailRow.style.display = isOpen ? "none" : "table-row";
        toggleBtn.textContent = isOpen ? "詳細" : "閉じる";
        this.expandedIds[item.isbn] = !isOpen;
      };
      if (this.expandedIds[item.isbn]) toggle();
      toggleBtn.onclick = (e) => { e.stopPropagation(); toggle(); };
      mainRow.onclick = () => toggle();
    });
  },

  ensureDetailRendered(item, root, params, detailRow) {
    const td = detailRow.querySelector("td");
    if (td.dataset.rendered === "1") return;
    td.dataset.rendered = "1";
    td.innerHTML = this.buildDetailHtml(item);

    const id = cssId(item.isbn);
    (item.tags_by_store || []).forEach((sec) => {
      const secId = `${id}-${sec.store_id}`;

      const tagToggleBtn = document.getElementById(`tagform-toggle-${secId}`);
      const tagFormRow = document.getElementById(`tagform-row-${secId}`);
      if (tagToggleBtn && tagFormRow) {
        tagToggleBtn.onclick = (e) => {
          e.stopPropagation();
          const showing = tagFormRow.style.display !== "none";
          tagFormRow.style.display = showing ? "none" : "flex";
          if (!showing) document.getElementById(`taginput-${secId}`).focus();
        };
      }

      const moveToggleBtn = document.getElementById(`move-toggle-${secId}`);
      const moveFormEl = document.getElementById(`move-form-${secId}`);
      if (moveToggleBtn && moveFormEl) {
        moveToggleBtn.onclick = (e) => {
          e.stopPropagation();
          const showing = moveFormEl.style.display !== "none";
          moveFormEl.style.display = showing ? "none" : "block";
          moveToggleBtn.textContent = (showing ? "▸" : "▾") + " 在庫を移動する";
        };
      }

      const addBtn = document.getElementById(`tagadd-${secId}`);
      if (addBtn) {
        addBtn.onclick = async (e) => {
          e.stopPropagation();
          const input = document.getElementById(`taginput-${secId}`);
          const name = input.value.trim();
          if (!name) return;
          try {
            await Api.post(`/api/stores/${sec.store_id}/books/${encodeURIComponent(item.isbn)}/tags`, { tag_name: name });
            Util.toast("タグを追加しました", "success");
            this.expandedIds[item.isbn] = true;
            this.loadAndRenderList(root, params);
          } catch (e2) {
            Util.toast("タグ追加に失敗しました: " + e2.message, "error");
          }
        };
      }
      const taginputEl = document.getElementById(`taginput-${secId}`);
      if (taginputEl) {
        taginputEl.onclick = (e) => e.stopPropagation();
        taginputEl.addEventListener("keydown", (e) => {
          if (e.key === "Enter") addBtn.click();
        });
      }
      sec.tags.forEach((tagName) => {
        const delBtn = document.getElementById(`tagdel-${secId}-${cssId(tagName)}`);
        if (delBtn) {
          delBtn.onclick = async (e) => {
            e.stopPropagation();
            const allTags = await Api.get("/api/tags");
            const tag = allTags.find((t) => t.name === tagName);
            if (!tag) return;
            await Api.del(`/api/stores/${sec.store_id}/books/${encodeURIComponent(item.isbn)}/tags/${tag.id}`);
            Util.toast("タグを削除しました", "success");
            this.expandedIds[item.isbn] = true;
            this.loadAndRenderList(root, params);
          };
        }
      });

      const moveBtn = document.getElementById(`move-btn-${secId}`);
      if (moveBtn) {
        moveBtn.onclick = async (e) => {
          e.stopPropagation();
          const fromLoc = document.getElementById(`move-from-loc-${secId}`).value;
          const toStoreId = parseInt(document.getElementById(`move-to-store-${secId}`).value, 10);
          const toLoc = document.getElementById(`move-to-loc-${secId}`).value;
          const qty = parseInt(document.getElementById(`move-qty-${secId}`).value || "0", 10);
          const moveDate = document.getElementById(`move-date-${secId}`).value;
          if (!qty || qty <= 0) { Util.toast("数量は1以上を入力してください", "warning"); return; }
          if (sec.store_id === toStoreId && fromLoc === toLoc) {
            Util.toast("移動元と移動先が同じです。別の店舗、またはエリアを変えて指定してください", "error");
            return;
          }
          try {
            const rec = await Api.post("/api/transfers", {
              isbn: item.isbn,
              from_store_id: sec.store_id, to_store_id: toStoreId,
              from_location: fromLoc, to_location: toLoc,
              quantity: qty, transfer_date: moveDate || null, note: "",
            });
            Util.toast(
              `「${rec.title || rec.isbn}」を${rec.from_store_name}(${Util.locationLabel(rec.from_location)})から${rec.to_store_name}(${Util.locationLabel(rec.to_location)})へ${rec.quantity}冊移動しました`,
              "success"
            );
            this.expandedIds[item.isbn] = true;
            this.loadAndRenderList(root, params);
          } catch (e2) {
            Util.toast("移動に失敗しました: " + e2.message, "error");
          }
        };
      }
    });
  },

  renderRow(item) {
    const id = cssId(item.isbn);
    const tagsText = item.tags.length ? item.tags.join(", ") : "-";
    const wholesalerNames = [...new Set(item.lots.map((l) => l.wholesaler_name).filter(Boolean))];
    const wholesalerText = wholesalerNames.length ? wholesalerNames.join("、") : "-";
    const priceText = item.price ? Util.fmtYen(item.price) : "-";
    const storeText = (item.store_names && item.store_names.length) ? item.store_names.join("、") : "-";

    return `
      <tr class="stock-row" id="row-${id}">
        <td class="stock-title" title="${Util.escapeHtml(item.title || "")}">${Util.escapeHtml(item.title || "(書名未登録)")}</td>
        <td class="stock-ellipsis">${Util.escapeHtml(item.author || "")}</td>
        <td class="stock-ellipsis">${Util.escapeHtml(item.publisher || "")}</td>
        <td class="stock-ellipsis" title="${Util.escapeHtml(wholesalerText)}">${Util.escapeHtml(wholesalerText)}</td>
        <td class="num">${priceText}</td>
        <td class="stock-ellipsis" title="${Util.escapeHtml(storeText)}">${Util.escapeHtml(storeText)}</td>
        <td class="num">${item.floor_quantity}</td>
        <td class="num">${item.warehouse_quantity}</td>
        <td class="stock-ellipsis" title="${Util.escapeHtml(tagsText)}">${Util.escapeHtml(tagsText)}</td>
        <td><button class="small secondary" id="toggle-${id}">詳細</button></td>
      </tr>
      <tr class="stock-detail-row" id="detail-${id}" style="display:none;">
        <td colspan="10"></td>
      </tr>
    `;
  },

  buildDetailHtml(item) {
    const id = cssId(item.isbn);
    const lotsByStore = {};
    item.lots.forEach((l) => {
      const key = l.store_id;
      (lotsByStore[key] = lotsByStore[key] || []).push(l);
    });

    const sections = (item.tags_by_store && item.tags_by_store.length ? item.tags_by_store : [{ store_id: null, store_name: null, tags: [] }])
      .map((sec) => {
        const secId = `${id}-${sec.store_id}`;
        const secLots = lotsByStore[sec.store_id] || [];
        const lotRows = secLots.map((lot) => `
          <tr>
            <td><span class="${Util.purchaseTypeBadgeClass(lot.purchase_type)}">${Util.purchaseTypeLabel(lot.purchase_type)}</span></td>
            <td><span class="${Util.locationBadgeClass(lot.location)}">${Util.locationLabel(lot.location)}</span></td>
            <td>${Util.escapeHtml(lot.wholesaler_name || "-")}</td>
            <td>${lot.quantity}</td>
            <td>${Util.fmtDate(lot.received_date)}</td>
            <td>${lot.consignment_deadline ? Util.fmtDate(lot.consignment_deadline) : "-"}</td>
            <td>${Util.escapeHtml(lot.note || "")}</td>
          </tr>
        `).join("");

        const tagPills = sec.tags.map((t) => `
          <span class="tag-pill">${Util.escapeHtml(t)}<button id="tagdel-${secId}-${cssId(t)}" title="削除">×</button></span>
        `).join("");

        // 移動元エリアの選択肢(在庫がある保管場所のみ)
        const floorQty = secLots.filter((l) => (l.location || "floor") === "floor" && l.status === "active").reduce((s, l) => s + l.quantity, 0);
        const warehouseQty = secLots.filter((l) => l.location === "warehouse" && l.status === "active").reduce((s, l) => s + l.quantity, 0);
        const fromLocOptions = [];
        if (floorQty > 0) fromLocOptions.push({ value: "floor", label: `店内(在庫${floorQty}冊)` });
        if (warehouseQty > 0) fromLocOptions.push({ value: "warehouse", label: `倉庫(在庫${warehouseQty}冊)` });

        let moveFormHtml = "";
        if (fromLocOptions.length && sec.store_id !== null) {
          const defaultFromLoc = fromLocOptions[0].value;
          const otherStore = StoreState.stores.find((s) => s.id !== sec.store_id);
          const defaultToStoreId = otherStore ? otherStore.id : sec.store_id;
          const defaultToLoc = (defaultToStoreId === sec.store_id) ? (defaultFromLoc === "floor" ? "warehouse" : "floor") : "floor";
          const maxQty = Math.max(floorQty, warehouseQty);

          moveFormHtml = `
            <div class="form-inline detail-move-fields">
              <div class="form-row">
                <label>移動元エリア</label>
                <select id="move-from-loc-${secId}">
                  ${fromLocOptions.map((o) => `<option value="${o.value}">${Util.escapeHtml(o.label)}</option>`).join("")}
                </select>
              </div>
              <div class="form-row">
                <label>移動先店舗</label>
                <select id="move-to-store-${secId}">
                  ${StoreState.stores.map((s) => `<option value="${s.id}" ${s.id === defaultToStoreId ? "selected" : ""}>${Util.escapeHtml(s.name)}</option>`).join("")}
                </select>
              </div>
              <div class="form-row">
                <label>移動先エリア</label>
                <select id="move-to-loc-${secId}">
                  <option value="floor" ${defaultToLoc === "floor" ? "selected" : ""}>店内</option>
                  <option value="warehouse" ${defaultToLoc === "warehouse" ? "selected" : ""}>倉庫</option>
                </select>
              </div>
              <div class="form-row">
                <label>数量</label>
                <input type="number" min="1" max="${maxQty}" value="1" id="move-qty-${secId}" style="width:70px;">
              </div>
              <div class="form-row">
                <label>移動日</label>
                <input type="date" id="move-date-${secId}" value="${Util.todayStr()}">
              </div>
              <button class="small" id="move-btn-${secId}">移動する</button>
            </div>
          `;
        }

        const hasMoveOptions = fromLocOptions.length && sec.store_id !== null;

        return `
          <div class="stock-detail-store-section">
            <div class="detail-section-header">
              <strong class="detail-store-name">${Util.escapeHtml(sec.store_name || "(店舗不明)")}</strong>
              <span class="detail-tags">${tagPills || '<span class="empty-msg" style="font-style:normal;">タグ未設定</span>'}</span>
              <button class="tiny-link" id="tagform-toggle-${secId}">+ タグ追加</button>
            </div>
            <div class="detail-tag-add-row" id="tagform-row-${secId}" style="display:none;">
              <input type="text" id="taginput-${secId}" placeholder="新しいタグ(例: 文庫棚A-3)" style="max-width:220px;">
              <button class="small" id="tagadd-${secId}">追加</button>
            </div>
            <table class="detail-lot-table">
              <thead><tr><th>入荷形態</th><th>保管場所</th><th>卸会社</th><th>数量</th><th>入荷日</th><th>返品期限</th><th>備考</th></tr></thead>
              <tbody>${lotRows || '<tr><td colspan="7" class="empty-msg">在庫ロットがありません</td></tr>'}</tbody>
            </table>
            ${hasMoveOptions ? `
              <button class="tiny-link detail-move-toggle" id="move-toggle-${secId}">▸ 在庫を移動する</button>
              <div class="stock-move-form" id="move-form-${secId}" style="display:none;">${moveFormHtml}</div>
            ` : ""}
          </div>
        `;
      }).join("");

    return `
      <div class="stock-detail-inner">
        <div style="color:var(--text-muted); font-size:0.85em; margin-bottom:8px;">
          ISBN: ${Util.escapeHtml(item.isbn)}
        </div>
        ${sections}
      </div>
    `;
  },
};

function cssId(s) {
  return String(s).replace(/[^a-zA-Z0-9_-]/g, "_");
}

const PURCHASE_CSV_TEMPLATE =
  "isbn,title,author,publisher,price,wholesaler_name,purchase_type,quantity,unit_cost,received_date,consignment_deadline,location\n" +
  "'9784000000000,サンプル書名,サンプル著者,サンプル出版社,1500,日販,買切,10,1050,2026-07-01,,店内\n" +
  "'9784000000001,サンプル書名2,サンプル著者2,サンプル出版社2,1200,トーハン,委託,5,900,2026-07-01,2026-09-30,倉庫\n";

const PageReceive = {
  currentBook: null, // { isbn, title, author, publisher, price, c_code, classification_text }
  manualEntry: false, // バーコードが無い商品を手入力で登録している最中かどうか
  selectedStoreId: null,
  batchSettings: {
    wholesalerId: null,
    purchaseType: "buy",
    consignmentDeadline: "",
    receivedDate: null,

  sessionLog: [], // このページを開いてから登録した項目の一覧(画面上の確認用。ページ再読み込みで消える)

  async render(root) {
    this.currentBook = null;
    if (this.selectedStoreId === null || !StoreState.stores.some((s) => s.id === this.selectedStoreId)) {

    root.innerHTML = `
      <h1>入荷登録</h1>
      <p class="subtitle">卸会社・買切/委託を分けて、選択した店舗への入荷を登録します。</p>

      <div class="card" id="batch-settings-card">
        <h2 style="margin-top:0;">入荷条件(まとめて設定)</h2>
        <p class="barcode-hint">ここで設定した内容は、変更するまでこのあとスキャンする本すべてに引き継がれます。同じ卸から届いた荷物をまとめて登録するときは、最初に1回設定するだけで大丈夫です。</p>
        <div class="grid-2">
          <div class="form-row">

          <div class="form-row">

            <select id="batch-wholesaler">
              <option value="" ${!this.batchSettings.wholesalerId ? "selected" : ""}>(指定なし)</option>
              ${wholesalers.map((w) => `<option value="${w.id}" ${String(w.id) === String(this.batchSettings.wholesalerId) ? "selected" : ""}>${Util.escapeHtml(w.name)}</option>`).join("")}
            </select>
          </div>
          <div class="form-row">
            <label>入荷形態<span class="field-required-badge">必須</span></label>
            <select id="batch-purchase-type">
              <option value="buy" ${this.batchSettings.purchaseType === "buy" ? "selected" : ""}>買切</option>
              <option value="consignment" ${this.batchSettings.purchaseType === "consignment" ? "selected" : ""}>委託</option>
            </select>
          </div>
          <div class="form-row" id="batch-deadline-row" style="display:${this.batchSettings.purchaseType === "consignment" ? "" : "none"};">
            <label>返品期限(委託の場合)<span class="field-required-badge">必須</span></label>
            <input type="date" id="batch-deadline" value="${this.batchSettings.consignmentDeadline || ""}">
          </div>
          <div class="form-row">
            <label>入荷日<span class="field-required-badge">必須</span></label>
            <input type="date" id="batch-received-date" value="${this.batchSettings.receivedDate}">
          </div>
          <div class="form-row">
            <label>保管場所<span class="field-required-badge">必須</span></label>
            <select id="batch-location">
              <option value="floor" ${this.batchSettings.location !== "warehouse" ? "selected" : ""}>店内</option>
              <option value="warehouse" ${this.batchSettings.location === "warehouse" ? "selected" : ""}>倉庫</option>
            </select>
          </div>
        </div>
      </div>

      <div class="barcode-box">
        <label><strong>バーコードをスキャン</strong>(上段のISBNバーコード→下段の価格・分類バーコードの順にスキャンしてください)</label>
        <input type="text" id="scan-input" autofocus placeholder="ここにカーソルを置いてバーコードをスキャン、または手入力してEnter">
        <div class="barcode-hint">2段バーコードの下段(192/191から始まるコード)をスキャンすると、価格・分類コードを自動反映します。上の「入荷条件」はそのままで、続けて次の本をスキャンできます。</div>
        <p style="margin-top:10px; margin-bottom:0;">
          <button class="small secondary" id="manual-entry-btn">バーコードが無い書籍・商品を手入力で登録</button>
        </p>
      </div>

      <div class="card" id="book-form-card" style="display:none;">
        <h2 style="margin-top:0;" id="book-form-title">スキャンした書籍</h2>
        <div class="grid-2">
          <div class="form-row"><label id="f-isbn-label">ISBN</label><input type="text" id="f-isbn" readonly></div>
          <div class="form-row"><label>書名<span class="field-required-badge">必須</span></label><input type="text" id="f-title"></div>
          <div class="form-row"><label>著者<span class="field-optional-badge">任意</span></label><input type="text" id="f-author"></div>
          <div class="form-row"><label>出版社<span class="field-optional-badge">任意</span></label><input type="text" id="f-publisher"></div>
          <div class="form-row"><label>本体価格(円・税別)<span class="field-required-badge">必須</span></label><input type="number" id="f-price"></div>
          <div class="form-row"><label>分類(Cコード)<span class="field-optional-badge">任意</span></label><input type="text" id="f-classification" readonly></div>
          <div class="form-row"><label>数量<span class="field-required-badge">必須</span></label><input type="number" id="f-quantity" value="1" min="1"></div>
          <div class="form-row"><label>入荷単価(円)<span class="field-optional-badge">任意</span></label><input type="number" id="f-unit-cost" value="0"></div>
        </div>
        <div class="form-row"><label>備考<span class="field-optional-badge">任意</span></label><input type="text" id="f-note"></div>
        <button id="submit-receive">この内容で登録して次へ</button>
        <button class="secondary" id="clear-form">この書籍をキャンセル</button>
      </div>

      <div class="card">
        <h2 style="margin-top:0;">今回の入荷登録ログ</h2>
        <table>
          <thead><tr><th>書名</th><th>卸会社</th><th>入荷形態</th><th>保管場所</th><th>数量</th><th>時刻</th></tr></thead>
          <tbody id="session-log-body">${this.renderLogRows()}</tbody>
        </table>
      </div>

      <div class="card">
        <h2 style="margin-top:0;">CSV取込(入荷データをまとめて取り込む)</h2>
        <p class="barcode-hint">「${Util.escapeHtml(StoreState.stores.find((s) => s.id === storeId).name)}」(上の「入荷先店舗」で選択中の店舗)の在庫として取り込まれます。</p>
        <p>列: <code>isbn, title, author, publisher, price, wholesaler_name, purchase_type(買切/委託), quantity, unit_cost, received_date, consignment_deadline, location(店内/倉庫・省略時は店内)</code></p>
        <p class="barcode-hint">ISBNをExcelで開くと指数表記(例: 9.78428E+12)になることがあります。テンプレートのように先頭に <code>'</code> を付けると文字列として正しく表示されます(取込時は自動的に取り除かれます)。</p>
        <p><button class="small secondary" id="dl-purchase-template">テンプレートCSVをダウンロード</button></p>
        <div class="csv-dropzone" id="purchase-dropzone">
          <p class="csv-dropzone-badge">ドラッグ&ドロップ対応</p>
          <p class="csv-dropzone-text">ここにCSVファイルをドラッグ&ドロップ<br>またはクリックしてファイルを選択</p>
          <p class="csv-dropzone-filename" id="purchase-filename"></p>
        </div>
        <input type="file" id="purchase-file" accept=".csv" style="display:none;">
        <button id="purchase-upload-btn">取込実行</button>
        <div id="purchase-result"></div>
      </div>
    `;

    document.getElementById("batch-store").addEventListener("change", (e) => {
      this.selectedStoreId = parseInt(e.target.value, 10);
      StoreState.setCurrentStore(this.selectedStoreId);
      this.render(root);
    });
    document.getElementById("batch-wholesaler").addEventListener("change", (e) => {
      this.batchSettings.wholesalerId = e.target.value || null;
    });
    document.getElementById("batch-purchase-type").addEventListener("change", (e) => {
      this.batchSettings.purchaseType = e.target.value;
      document.getElementById("batch-deadline-row").style.display = e.target.value === "consignment" ? "" : "none";
    });
    document.getElementById("batch-deadline").addEventListener("change", (e) => {
      this.batchSettings.consignmentDeadline = e.target.value;
    });
    document.getElementById("batch-received-date").addEventListener("change", (e) => {
      this.batchSettings.receivedDate = e.target.value;
    });
    document.getElementById("batch-location").addEventListener("change", (e) => {
      this.batchSettings.location = e.target.value;
    });

    const scanInput = document.getElementById("scan-input");
    scanInput.addEventListener("keydown", async (e) => {
      if (e.key !== "Enter") return;
      const code = scanInput.value.trim();
      scanInput.value = "";
      if (!code) return;
      await this.handleScan(code);
    });

    document.getElementById("submit-receive").onclick = () => this.submit(storeId);
    document.getElementById("clear-form").onclick = () => this.cancelCurrentBook();
    document.getElementById("manual-entry-btn").onclick = () => this.startManualEntry();

    // 数量欄でEnter → 価格欄へ、価格欄でEnter → そのまま登録して次の書籍へ
    // (マウス操作なしで スキャン→数量→価格→Enter の流れだけで次々登録できるようにする)
    const qtyField = document.getElementById("f-quantity");
    const priceField = document.getElementById("f-price");
    qtyField.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      priceField.focus();
      priceField.select();
    });
    priceField.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      this.submit(storeId);
    });

    document.getElementById("dl-purchase-template").onclick = () => {
      Csv.downloadText("purchase_template.csv", PURCHASE_CSV_TEMPLATE);
    };
    Csv.setupDropzone("purchase-dropzone", "purchase-file", "purchase-filename");
    document.getElementById("purchase-upload-btn").onclick = async () => {
      const fileInput = document.getElementById("purchase-file");
      if (!fileInput.files.length) { Util.toast("CSVファイルを選択してください", "warning"); return; }
      try {
        const result = await Api.uploadFile(`/api/stores/${storeId}/stock/import-purchase-csv`, fileInput.files[0]);
        Csv.renderImportResult(document.getElementById("purchase-result"), result);

        Util.toast("取込に失敗しました: " + e.message, "error");

  renderLogRows() {
    if (this.sessionLog.length === 0) {
      return `<tr><td colspan="6" class="empty-msg">まだ登録はありません</td></tr>`;
    }
    return this.sessionLog.slice().reverse().map((l) => `
      <tr>
        <td>${Util.escapeHtml(l.title || l.isbn)}</td>
        <td>${Util.escapeHtml(l.wholesalerName || "-")}</td>
        <td><span class="${Util.purchaseTypeBadgeClass(l.purchaseType)}">${Util.purchaseTypeLabel(l.purchaseType)}</span></td>
        <td><span class="${Util.locationBadgeClass(l.location)}">${Util.locationLabel(l.location)}</span></td>
        <td>${l.quantity}</td>
        <td>${l.time}</td>
      </tr>
    `).join("");
  },

  cancelCurrentBook() {
    this.currentBook = null;
    this.manualEntry = false;
    const card = document.getElementById("book-form-card");
    if (card) card.style.display = "none";
    const scanInput = document.getElementById("scan-input");
    if (scanInput) {
      scanInput.value = "";
      scanInput.focus();
    }
  },

  startManualEntry() {
    this.currentBook = { isbn: "", title: "", author: "", publisher: "", price: 0, c_code: "", classification_text: "" };
    this.manualEntry = true;
    this.fillBookForm();
  },

  async handleScan(code) {
    let result;
    try {
      result = await Api.post("/api/books/scan", { code });
    } catch (e) {
      Util.toast("スキャン解析に失敗しました: " + e.message, "error");
      return;
    }

    if (result.kind === "isbn") {
      if (result.warning) {
        Util.toast(result.warning, "warning");
      }
      const book = result.book || { isbn: result.isbn, title: "", author: "", publisher: "", price: 0 };
      this.currentBook = { ...book, isbn: result.isbn };
      this.manualEntry = false;
      if (result.found_in === "openbd") {
        Util.toast("openBDから書誌情報を自動取得しました", "success");
      } else if (result.found_in === "local") {
        Util.toast("登録済みの書誌が見つかりました", "success");
      } else if (result.found_in === "none") {
        Util.toast("書誌情報が見つかりませんでした。手入力してください", "warning");
      }
      this.fillBookForm();
    } else if (result.kind === "price") {
      if (!this.currentBook) {
        Util.toast("先にISBN(上段)バーコードをスキャンしてください", "warning");
        return;
      }
      this.currentBook.price = result.price;
      this.currentBook.c_code = result.c_code;
      this.currentBook.classification_text = result.classification_text;
      document.getElementById("f-price").value = result.price;
      document.getElementById("f-classification").value = result.classification_text;
      Util.toast("価格・分類コードを反映しました", "success");
      // 2回のスキャンが完了したので、続けて数量を手入力できるようフォーカスを移す
      const qtyField = document.getElementById("f-quantity");
      qtyField.focus();
      qtyField.select();
    } else {
      Util.toast("認識できないバーコードです", "error");
    }
  },

  fillBookForm() {
    document.getElementById("book-form-card").style.display = "";
    const isbnField = document.getElementById("f-isbn");
    const isbnLabel = document.getElementById("f-isbn-label");
    isbnField.value = this.currentBook.isbn;
    isbnField.readOnly = !this.manualEntry;
    if (this.manualEntry) {
      isbnField.placeholder = "例: グッズ-001、雑貨-バッグ など任意のコード";
      isbnLabel.innerHTML = '商品コード(ISBNが無い場合)<span class="field-required-badge">必須</span>';
      document.getElementById("book-form-title").textContent = "手入力で登録する商品";
    } else {
      isbnField.placeholder = "";
      isbnLabel.textContent = "ISBN";
      document.getElementById("book-form-title").textContent = "スキャンした書籍";
    }
    document.getElementById("f-title").value = this.currentBook.title || "";
    document.getElementById("f-author").value = this.currentBook.author || "";
    document.getElementById("f-publisher").value = this.currentBook.publisher || "";
    document.getElementById("f-price").value = this.currentBook.price || 0;
    document.getElementById("f-classification").value = this.currentBook.classification_text || "";
    document.getElementById("f-quantity").value = 1;
    document.getElementById("f-unit-cost").value = 0;
    document.getElementById("f-note").value = "";
    if (this.manualEntry) {
      // 手入力の場合は商品コード欄からそのまま入力を始められるようにする
      isbnField.focus();
    } else {
      // 2段バーコード(ISBN→価格)の2回目をそのままスキャンできるよう、
      // フォーカスはスキャン欄に置いたままにする(数量欄には移さない)
      const scanInput = document.getElementById("scan-input");
      if (scanInput) scanInput.focus();
    }
  },

  async submit(storeId) {
    if (!this.currentBook) {
      Util.toast("先にバーコードをスキャンしてください", "warning");
      return;
    }
    const isbnValue = document.getElementById("f-isbn").value.trim();
    if (!isbnValue) {
      Util.toast(this.manualEntry ? "商品コードを入力してください" : "ISBNが取得できていません", "error");
      return;
    }
    const purchaseType = this.batchSettings.purchaseType;
    const deadline = this.batchSettings.consignmentDeadline;
    if (purchaseType === "consignment" && !deadline) {
      Util.toast("委託の場合は上の「入荷条件」で返品期限を入力してください", "error");
      return;
    }
    const quantity = parseInt(document.getElementById("f-quantity").value || "0", 10);
    if (!quantity || quantity <= 0) {
      Util.toast("数量は1以上を入力してください", "error");
      return;
    }
    const titleValue = document.getElementById("f-title").value.trim();
    if (!titleValue) {
      Util.toast("書名を入力してください", "error");
      return;
    }
    const priceValue = parseInt(document.getElementById("f-price").value || "0", 10);
    if (!priceValue || priceValue <= 0) {
      Util.toast("本体価格(税別)を入力してください", "error");
      return;
    }

    const payload = {
      isbn: isbnValue,
      title: titleValue,
      author: document.getElementById("f-author").value,
      publisher: document.getElementById("f-publisher").value,
      price: priceValue,
      wholesaler_id: this.batchSettings.wholesalerId ? parseInt(this.batchSettings.wholesalerId, 10) : null,
      purchase_type: purchaseType,
      quantity,
      unit_cost: parseInt(document.getElementById("f-unit-cost").value || "0", 10),
      received_date: this.batchSettings.receivedDate || null,
      consignment_deadline: purchaseType === "consignment" ? deadline : null,
      location: this.batchSettings.location,
      note: document.getElementById("f-note").value,
    };

    try {
      const lot = await Api.post(`/api/stores/${storeId}/stock/receive`, payload);
      Util.toast(`登録しました: ${this.currentBook.title || this.currentBook.isbn} × ${quantity}`, "success");
      this.sessionLog.push({
        isbn: this.currentBook.isbn,
        title: this.currentBook.title,
        quantity,
        wholesalerName: lot.wholesaler_name,
        purchaseType,
        location: lot.location,
        time: new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" }),
      });
      const logBody = document.getElementById("session-log-body");
      if (logBody) logBody.innerHTML = this.renderLogRows();
      this.cancelCurrentBook();
    } catch (e) {
      Util.toast("登録に失敗しました: " + e.message, "error");
    }
  },
};

const SALES_CSV_TEMPLATE =
  "isbn,quantity,sale_date,unit_price\n" +
  "'9784000000000,2,2026-07-10,1500\n" +
  "'9784000000001,1,2026-07-11,1200\n";

const PageSales = {
  salesPage: { pageSize: Pagination.loadPageSize("sales_page_size", 50), currentPage: 1 },
  importStoreId: null,

  async render(root) {
    root.innerHTML = `<p class="loading">読み込み中...</p>`;
    if (this.importStoreId === null || !StoreState.stores.some((s) => s.id === this.importStoreId)) {
      this.importStoreId = StoreState.currentStoreId;
    }
    let rows;
    try {
      rows = await Api.get(`/api/sales?days=90`);
    } catch (e) {
      root.innerHTML = `<p class="error-msg">読み込みに失敗しました: ${Util.escapeHtml(e.message)}</p>`;
      return;
    }

    const slice = Pagination.slice(rows, this.salesPage);

        <table class="masters-table">
          <colgroup><col style="width:38%"><col style="width:38%"><col style="width:180px"></colgroup>
          <thead><tr><th>店舗名</th><th>備考</th><th></th></tr></thead>

                  <tr>

                <tr>
                  <td>${Util.escapeHtml(s.name)}</td>
                  <td>${Util.escapeHtml(s.note || "")}</td>
                  <td class="actions-cell">
                    <button class="small secondary" id="edit-store-btn-${s.id}">編集</button>
                    ${stores.length > 1 ? `<button class="small danger" id="delete-store-btn-${s.id}">削除</button>` : ""}
                  </td>
                </tr>`;
            }).join("")}
          </tbody>
        </table>
        ${stores.length <= 1 ? '<p class="barcode-hint">店舗は最低1件必要なため、最後の1店舗は削除できません。</p>' : ""}
      </div>
      <div class="card">
        <h2 style="margin-top:0;">店舗を追加</h2>
        <div class="form-inline">
          <div class="form-row"><label>店舗名</label><input type="text" id="new-store-name"></div>
          <div class="form-row"><label>備考</label><input type="text" id="new-store-note"></div>
          <button id="add-store-btn">追加</button>
        </div>
      </div>
    `;

    stores.forEach((s) => {
      if (s.id === this.editingStoreId) {
        document.getElementById(`save-store-${s.id}`).onclick = async () => {
          const name = document.getElementById(`edit-store-name-${s.id}`).value.trim();
          const note = document.getElementById(`edit-store-note-${s.id}`).value;
          if (!name) { Util.toast("店舗名を入力してください", "warning"); return; }
          try {
            await Api.put(`/api/stores/${s.id}`, { name, note });
            await StoreState.refreshStores();
            Util.toast("店舗を更新しました", "success");
            this.editingStoreId = null;
            this.render(document.getElementById("app"));
          } catch (e) {
            Util.toast("更新に失敗しました: " + e.message, "error");
          }

        document.getElementById(`cancel-store-${s.id}`).onclick = () => {
          this.editingStoreId = null;
          this.render(document.getElementById("app"));

          this.editingStoreId = s.id;
          this.render(document.getElementById("app"));
        };
        const delBtn = document.getElementById(`delete-store-btn-${s.id}`);
        if (delBtn) {
          delBtn.onclick = async () => {
            const ok = window.confirm(
              `店舗「${s.name}」を削除します。この店舗の在庫・販売・返品・棚卸履歴もすべて削除され、元に戻せません。よろしいですか?`
            );

            try {
              const result = await Api.del(`/api/stores/${s.id}`);
              await StoreState.refreshStores();

                `店舗を削除しました(在庫ロット${result.removed.stockLots}件、販売${result.removed.sales}件、返品${result.removed.returns}件を含む)`,
                "success"
              );
              this.render(document.getElementById("app"));
            } catch (e) {
              Util.toast("削除に失敗しました: " + e.message, "error");
            }
          };
        }
      }
    });

    document.getElementById("add-store-btn").onclick = async () => {
      const name = document.getElementById("new-store-name").value.trim();
      if (!name) { Util.toast("店舗名を入力してください", "warning"); return; }
      try {
        await Api.post("/api/stores", { name, note: document.getElementById("new-store-note").value });
        await StoreState.refreshStores();
        Util.toast("店舗を追加しました", "success");
        this.render(document.getElementById("app"));
      } catch (e) {
        Util.toast("追加に失敗しました: " + e.message, "error");
      }

  },

  // ---------------- 卸会社 ----------------
  async renderWholesalers(content) {
    const wholesalers = await Api.get("/api/wholesalers");
    content.innerHTML = `
      <div class="card">
        <table class="masters-table">
          <colgroup><col style="width:26%"><col style="width:26%"><col style="width:26%"><col style="width:180px"></colgroup>
          <thead><tr><th>卸会社名</th><th>連絡先</th><th>備考</th><th></th></tr></thead>
          <tbody>
            ${wholesalers.map((w) => {
              if (w.id === this.editingWholesalerId) {
                return `
                  <tr>
                    <td><input type="text" id="edit-w-name-${w.id}" value="${Util.escapeHtml(w.name)}"></td>
                    <td><input type="text" id="edit-w-contact-${w.id}" value="${Util.escapeHtml(w.contact || "")}"></td>
                    <td><input type="text" id="edit-w-note-${w.id}" value="${Util.escapeHtml(w.note || "")}"></td>
                    <td class="actions-cell">
                      <button class="small" id="save-w-${w.id}">保存</button>
                      <button class="small secondary" id="cancel-w-${w.id}">キャンセル</button>
                    </td>
                  </tr>`;
              }
              return `
                <tr>
                  <td>${Util.escapeHtml(w.name)}</td>
                  <td>${Util.escapeHtml(w.contact || "")}</td>
                  <td>${Util.escapeHtml(w.note || "")}</td>
                  <td class="actions-cell">
                    <button class="small secondary" id="edit-w-btn-${w.id}">編集</button>
                    <button class="small danger" id="delete-w-btn-${w.id}">削除</button>
                  </td>
                </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>
      <div class="card">
        <h2 style="margin-top:0;">卸会社を追加</h2>
        <div class="form-inline">
          <div class="form-row"><label>卸会社名</label><input type="text" id="new-w-name"></div>
          <div class="form-row"><label>連絡先</label><input type="text" id="new-w-contact"></div>
          <div class="form-row"><label>備考</label><input type="text" id="new-w-note"></div>
          <button id="add-w-btn">追加</button>
        </div>
      </div>
    `;

    wholesalers.forEach((w) => {
      if (w.id === this.editingWholesalerId) {
        document.getElementById(`save-w-${w.id}`).onclick = async () => {
          const name = document.getElementById(`edit-w-name-${w.id}`).value.trim();
          if (!name) { Util.toast("卸会社名を入力してください", "warning"); return; }
          try {
            await Api.put(`/api/wholesalers/${w.id}`, {
              name,
              contact: document.getElementById(`edit-w-contact-${w.id}`).value,
              note: document.getElementById(`edit-w-note-${w.id}`).value,
            });
            Util.toast("卸会社を更新しました", "success");
            this.editingWholesalerId = null;
            this.render(document.getElementById("app"));
          } catch (e) {
            Util.toast("更新に失敗しました: " + e.message, "error");
          }
        };
        document.getElementById(`cancel-w-${w.id}`).onclick = () => {
          this.editingWholesalerId = null;
          this.render(document.getElementById("app"));
        };
      } else {
        document.getElementById(`edit-w-btn-${w.id}`).onclick = () => {
          this.editingWholesalerId = w.id;
          this.render(document.getElementById("app"));
        };
        document.getElementById(`delete-w-btn-${w.id}`).onclick = async () => {
          const ok = window.confirm(
            `卸会社「${w.name}」を削除します。この卸会社が紐づいている入荷・返品データは「卸会社不明」として残ります。よろしいですか?`
          );
          if (!ok) return;
          try {
            const result = await Api.del(`/api/wholesalers/${w.id}`);
            Util.toast(
              `卸会社を削除しました(入荷ロット${result.detachedLots}件、返品${result.detachedReturns}件の卸会社情報を解除)`,
              "success"
            );
            this.render(document.getElementById("app"));
          } catch (e) {
            Util.toast("削除に失敗しました: " + e.message, "error");
          }
        };
      }

    document.getElementById("add-w-btn").onclick = async () => {
      const name = document.getElementById("new-w-name").value.trim();
      if (!name) { Util.toast("卸会社名を入力してください", "warning"); return; }

        await Api.post("/api/wholesalers", {
          name, contact: document.getElementById("new-w-contact").value, note: document.getElementById("new-w-note").value,

  // ---------------- 書誌 ----------------
  async renderBooks(content) {
    const editing = !!this.editingBookIsbn;
    let editBook = null;
    if (editing) {
      try { editBook = await Api.get(`/api/books/${encodeURIComponent(this.editingBookIsbn)}`); }
      catch (e) { this.editingBookIsbn = null; }
    }

    content.innerHTML = `
      <div class="card">
        <div class="form-inline">
          <div class="form-row" style="flex:1;"><label>検索(ISBN・書名・著者・出版社)</label><input type="text" id="book-search-input"></div>
          <button id="book-search-btn">検索</button>
        </div>
        <div id="book-search-result"></div>
      </div>
      <div class="card">
        <h2 style="margin-top:0;">${editing ? "書誌を編集" : "書誌を手動登録"}</h2>
        <div class="grid-2">
          <div class="form-row"><label>ISBN</label><input type="text" id="mb-isbn" ${editing ? "readonly" : ""} value="${editBook ? Util.escapeHtml(editBook.isbn) : ""}"></div>
          <div class="form-row"><label>書名</label><input type="text" id="mb-title" value="${editBook ? Util.escapeHtml(editBook.title) : ""}"></div>
          <div class="form-row"><label>著者</label><input type="text" id="mb-author" value="${editBook ? Util.escapeHtml(editBook.author) : ""}"></div>
          <div class="form-row"><label>出版社</label><input type="text" id="mb-publisher" value="${editBook ? Util.escapeHtml(editBook.publisher) : ""}"></div>
          <div class="form-row"><label>本体価格(円・税別)</label><input type="number" id="mb-price" value="${editBook ? editBook.price : ""}"></div>
          <div class="form-row"><label>分類(Cコード・4桁)</label><input type="text" id="mb-ccode" value="${editBook ? Util.escapeHtml(editBook.c_code || "") : ""}"></div>
          <div class="form-row"><label>分類表示テキスト</label><input type="text" id="mb-classification" value="${editBook ? Util.escapeHtml(editBook.classification_text || "") : ""}"></div>
          <div class="form-row"><label>雑誌コード(任意)</label><input type="text" id="mb-magazine" value="${editBook ? Util.escapeHtml(editBook.magazine_code || "") : ""}"></div>
          <div class="form-row"><label>表紙画像URL(任意)</label><input type="text" id="mb-cover" value="${editBook ? Util.escapeHtml(editBook.cover_url || "") : ""}"></div>
        </div>
        <button id="mb-save-btn">${editing ? "更新する" : "保存"}</button>
        ${editing ? '<button class="secondary" id="mb-cancel-btn">新規登録に戻す</button>' : ""}
        ${editing ? '<button class="danger" id="mb-delete-btn">この書誌を削除</button>' : ""}
      </div>
    `;

    const doSearch = async () => {
      const q = document.getElementById("book-search-input").value;
      const books = await Api.get(`/api/books/search?q=${encodeURIComponent(q)}`);
      document.getElementById("book-search-result").innerHTML = `
        <table class="masters-table" style="margin-top:10px;">
          <colgroup><col style="width:16%"><col style="width:26%"><col style="width:16%"><col style="width:16%"><col style="width:10%"><col style="width:180px"></colgroup>
          <thead><tr><th>ISBN</th><th>書名</th><th>著者</th><th>出版社</th><th>本体価格(税別)</th><th></th></tr></thead>
          <tbody>${books.length ? books.map((b) => `
            <tr>
              <td>${Util.escapeHtml(b.isbn)}</td><td>${Util.escapeHtml(b.title)}</td>
              <td>${Util.escapeHtml(b.author)}</td><td>${Util.escapeHtml(b.publisher)}</td>
              <td>${b.price ? Util.fmtYen(b.price) : ""}</td>
              <td class="actions-cell">
                <button class="small secondary" id="edit-book-${cssId(b.isbn)}">編集</button>
                <button class="small danger" id="delete-book-${cssId(b.isbn)}">削除</button>
              </td>
            </tr>`).join("") : '<tr><td colspan="6" class="empty-msg">該当なし</td></tr>'}</tbody>
        </table>
      `;
      books.forEach((b) => {
        const btn = document.getElementById(`edit-book-${cssId(b.isbn)}`);
        if (btn) {
          btn.onclick = () => {
            this.editingBookIsbn = b.isbn;
            this.render(document.getElementById("app"));
          };
        }
        const delBtn = document.getElementById(`delete-book-${cssId(b.isbn)}`);
        if (delBtn) {
          delBtn.onclick = () => this.deleteBook(b.isbn, b.title);
        }
      });
    };
    document.getElementById("book-search-btn").onclick = doSearch;
    document.getElementById("book-search-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doSearch();
    });
    if (editing) {
      document.getElementById("book-search-input").value = editBook.isbn;
      await doSearch();
    }

    if (editing) {
      document.getElementById("mb-cancel-btn").onclick = () => {
        this.editingBookIsbn = null;
        this.render(document.getElementById("app"));
      };
      document.getElementById("mb-delete-btn").onclick = () => this.deleteBook(editBook.isbn, editBook.title);
    }

    document.getElementById("mb-save-btn").onclick = async () => {
      const isbn = document.getElementById("mb-isbn").value.trim();
      if (!isbn) { Util.toast("ISBNを入力してください", "warning"); return; }
      try {
        await Api.post("/api/books", {
          isbn, title: document.getElementById("mb-title").value,
          author: document.getElementById("mb-author").value,
          publisher: document.getElementById("mb-publisher").value,
          price: parseInt(document.getElementById("mb-price").value || "0", 10),
          c_code: document.getElementById("mb-ccode").value,
          classification_text: document.getElementById("mb-classification").value,
          magazine_code: document.getElementById("mb-magazine").value,
          cover_url: document.getElementById("mb-cover").value,
          is_manual_entry: true,
        });
        Util.toast(editing ? "書誌を更新しました" : "書誌を保存しました", "success");
        this.editingBookIsbn = null;
        this.render(document.getElementById("app"));
      } catch (e) {
        Util.toast("保存に失敗しました: " + e.message, "error");
      }
    };
  },

  async deleteBook(isbn, title) {
    const ok = window.confirm(
      `書誌「${title || isbn}」を削除します。全店舗の在庫・販売・返品・棚卸履歴・タグ付けもすべて削除され、元に戻せません。よろしいですか?`
    );
    if (!ok) return;
    try {
      const result = await Api.del(`/api/books/${encodeURIComponent(isbn)}`);
      Util.toast(
        `書誌を削除しました(在庫ロット${result.removed.stockLots}件、販売${result.removed.sales}件、返品${result.removed.returns}件を含む)`,
        "success"
      );
      if (this.editingBookIsbn === isbn) this.editingBookIsbn = null;
      this.render(document.getElementById("app"));
    } catch (e) {
      Util.toast("削除に失敗しました: " + e.message, "error");
    }
  },

  // ---------------- タグ ----------------

    const tags = await Api.get("/api/tags");
    content.innerHTML = `
      <div class="card">
        <p>タグは在庫一覧画面から書籍ごとに自由に付与・削除できます。ここでは名称の変更・タグ自体の削除ができます。</p>
        <table class="masters-table">

          <tbody>

                    <td class="actions-cell">
                      <button class="small" id="save-tag-${t.id}">保存</button>
                      <button class="small secondary" id="cancel-tag-${t.id}">キャンセル</button>
                    </td>

              }
              return `
                <tr>
                  <td>${Util.escapeHtml(t.name)}</td>

                    <button class="small danger" id="delete-tag-btn-${t.id}">削除</button>
                  </td>
                </tr>`;
            }).join("") : '<tr><td colspan="2" class="empty-msg">タグはまだ登録されていません</td></tr>'}
          </tbody>
        </table>
      </div>
    `;

    tags.forEach((t) => {
      if (t.id === this.editingTagId) {
        document.getElementById(`save-tag-${t.id}`).onclick = async () => {
          const name = document.getElementById(`edit-tag-name-${t.id}`).value.trim();
          if (!name) { Util.toast("タグ名を入力してください", "warning"); return; }
          try {
            await Api.put(`/api/tags/${t.id}`, { name });

          this.editingTagId = null;
          this.render(document.getElementById("app"));
        };
      } else {
        document.getElementById(`edit-tag-btn-${t.id}`).onclick = () => {
          this.editingTagId = t.id;
          this.render(document.getElementById("app"));
        };
        document.getElementById(`delete-tag-btn-${t.id}`).onclick = async () => {
          const ok = window.confirm(`タグ「${t.name}」を削除します。すべての書籍からこのタグが外れます。よろしいですか?`);
          if (!ok) return;
          try {
            const result = await Api.del(`/api/tags/${t.id}`);
            Util.toast(`タグを削除しました(${result.removedLinks}件の書籍から解除)`, "success");
            this.render(document.getElementById("app"));
          } catch (e) {
            Util.toast("削除に失敗しました: " + e.message, "error");
          }
        };
      }
    });
  },
};

const Router = {
  routes: {
    "/dashboard": PageDashboard,
    "/stock": PageStock,
    "/receive": PageReceive,
    "/sales": PageSales,
    "/returns": PageReturns,
    "/stocktake": PageStocktake,
    "/masters": PageMasters,
    "/data": PageDashboard, // データ管理はダッシュボードに統合(旧リンク互換のため残す)
    "/transfer": PageStock, // 在庫移動は在庫一覧に統合(旧リンク互換のため残す)
    "/analytics": PageDashboard, // グラフはダッシュボードに統合(旧リンク互換のため残す)
    "/import": PageReceive, // CSV取込は入荷登録・販売履歴に統合(旧リンク互換のため残す)
  },

  parseHash() {
    let hash = location.hash.replace(/^#/, "");
    if (!hash) hash = "/dashboard";
    const [path, queryStr] = hash.split("?");
    const params = {};
    if (queryStr) {
      new URLSearchParams(queryStr).forEach((v, k) => { params[k] = v; });
    }
    return { path, params };
  },

  navigate(path, params) {
    let hash = "#" + path;
    if (params && Object.keys(params).length) {
      hash += "?" + new URLSearchParams(params).toString();
    }
    location.hash = hash;
  },

  async handle() {
    const { path, params } = this.parseHash();
    const page = this.routes[path] || PageDashboard;

    document.querySelectorAll(".topnav a").forEach((a) => {
      a.classList.toggle("active", a.getAttribute("data-route") === path);
    });

    const root = document.getElementById("app");
    try {
      await page.render(root, params);
    } catch (e) {
      root.innerHTML = `<p class="error-msg">画面の表示に失敗しました: ${Util.escapeHtml(e.message)}</p>`;
      console.error(e);
    }
  },

  reload() {
    this.handle();
  },

  init() {
    window.addEventListener("hashchange", () => this.handle());
    this.handle();
  },
};

(async function () {
  try {
    await ensureStateLoaded();
    await StoreState.init();
  } catch (e) {
    document.getElementById("app").innerHTML =
      `<p class="error-msg">初期化に失敗しました: ${Util.escapeHtml(e.message)}</p>`;
    console.error(e);
    return;
  }

  const logoutBtn = document.getElementById("logout-btn");
  if (logoutBtn) {
    logoutBtn.onclick = () => {
      if (window.confirm("ログアウトしますか?")) AuthGate.logout();
    };
  }

  const root = document.getElementById("app");
  AuthGate.guard(root, () => {
    Router.init();
    if (AppState.repairNotice) {
      Util.toast(AppState.repairNotice, "warning");
    }
  });
})();
